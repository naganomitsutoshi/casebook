<!DOCTYPE html>
<!-- Casebook v7: local-only inpatient tracker. v7: gamified input nudges (record/learning behavior only, never patient care) — today progress bars, untouched-case dots, export streak + 14-day dot row, evening in-app nudge, random completion message, cumulative counters. Stats in separate key casebook:stats (dates/counts only, no PII). v6.1: export Markdown headings in English (co-revised with the /casebook Vault skill). v6: calendar-range timeline, selectable grayscale dark theme, English section names, edit-everything. Storage key casebook:v2 unchanged. Implemented directly by Claude (Fable 5), no Codex. -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f3f5f3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Casebook</title>
<style>
  :root{
    color-scheme:light;
    --r-s:8px;
    --r-m:12px;
    --r-l:16px;
    --paper:#f3f5f3;
    --card:#ffffff;
    --surface-2:#f6f7f5;
    --field:#fbfcfa;
    --ink:#1b2620;
    --ink-soft:#4e5d55;
    --ink-faint:#63736a;
    --on-accent:#ffffff;
    --line:#d9dfd9;
    --line-soft:#e8ece8;
    --accent:#1f6f5f;
    --accent-deep:#164f44;
    --accent-soft:#e2efeb;
    --accent-line:#b6d7ce;
    --warn:#996414;
    --warn-soft:#f6ecd9;
    --warn-line:#e6cfa0;
    --danger:#b04040;
    --danger-soft:#fbeaea;
    --danger-line:#eec6c6;
    --done:#47734a;
    --done-soft:#e6efe6;
    --info:#38618c;
    --info-soft:#e6eff9;
  }
  /* ダークはグレースケール基調（面・線・文字は無彩色、強調色のみ色を残す） */
  :root[data-theme="dark"]{
    color-scheme:dark;
    --paper:#151515;
    --card:#1e1e1e;
    --surface-2:#262626;
    --field:#1a1a1a;
    --ink:#e9e9e9;
    --ink-soft:#b4b4b4;
    --ink-faint:#8e8e8e;
    --on-accent:#111111;
    --line:#3a3a3a;
    --line-soft:#2d2d2d;
    --accent:#57ab93;
    --accent-deep:#7cc4ae;
    --accent-soft:#22322d;
    --accent-line:#3c5a50;
    --warn:#d8a24f;
    --warn-soft:#332b1c;
    --warn-line:#5c4b26;
    --danger:#dd8080;
    --danger-soft:#382323;
    --danger-line:#5c3434;
    --done:#84b687;
    --done-soft:#233026;
    --info:#8db4dd;
    --info-soft:#202934;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI",sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.55;
    min-height:100vh;
    padding-bottom:48px;
  }
  button,input,textarea,select{font:inherit}
  button{border:none;background:none;cursor:pointer;color:inherit}
  textarea{resize:vertical}
  .mono{font-family:ui-monospace,"Consolas",monospace}
  .hide{display:none!important}
  .sub{color:var(--ink-soft);font-size:14px}

  .topbar{
    position:sticky;top:0;z-index:50;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .topbar-in{
    max-width:1100px;margin:0 auto;padding:10px 18px;
    display:flex;align-items:center;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:8px;cursor:pointer;min-height:44px}
  .brand strong{font-size:17px;display:flex;align-items:center;gap:8px}
  .brand strong::before{
    content:"";width:9px;height:9px;border-radius:50%;
    background:var(--accent);
  }
  .spacer{flex:1}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .pill-btn,.tab-btn,.chip,.btn{
    min-height:44px;border-radius:10px;transition:background .15s ease,border-color .15s ease,color .15s ease;
  }
  .pill-btn,.tab-btn,.chip{
    border:1px solid var(--line);background:var(--card);
    padding:0 14px;display:inline-flex;align-items:center;gap:8px;
  }
  @media(hover:hover){
    .pill-btn:hover,.tab-btn:hover,.chip:hover{border-color:var(--accent);color:var(--accent)}
    .btn-primary:hover{background:var(--accent-deep)}
    .compact-btn:hover{border-color:var(--accent);color:var(--accent)}
    .row-del:hover{color:var(--danger);background:var(--danger-soft)}
    .case-row:hover{border-color:var(--accent)}
  }
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:0 16px;font-weight:700;
  }
  .btn-primary{background:var(--accent);color:var(--on-accent)}
  .btn-ghost{background:var(--card);border:1px solid var(--line)}
  .btn-danger{background:var(--danger-soft);color:var(--danger);border:1px solid var(--danger-line)}
  .btn-block{width:100%}
  .chip,.tab-btn,.pill-btn{font-size:13px;font-weight:600}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .count-badge{
    min-width:22px;height:22px;padding:0 7px;border-radius:999px;
    background:var(--accent-soft);color:var(--accent);display:inline-flex;
    align-items:center;justify-content:center;font-size:12px;font-weight:700;
  }

  .bottombar{
    position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;
    background:var(--paper);
    border-top:1px solid var(--line);
    padding:6px 10px calc(6px + env(safe-area-inset-bottom));
  }
  .bottombar-in{display:flex;gap:6px;max-width:640px;margin:0 auto}
  .bnav{
    position:relative;flex:1;min-height:52px;border-radius:var(--r-m);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-size:11px;font-weight:700;color:var(--ink-soft);
  }
  .bnav .ico{font-size:18px;line-height:1.2}
  .bnav.on{color:var(--accent);background:var(--accent-soft)}
  .bnav .count-badge{
    position:absolute;top:2px;right:calc(50% - 30px);
    min-width:18px;height:18px;font-size:10px;padding:0 5px;
    background:var(--accent);color:var(--on-accent);
  }

  main{max-width:1100px;margin:0 auto;padding:14px 18px}
  .page-head{
    display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
    margin-bottom:14px;flex-wrap:wrap;
  }
  .page-title{font-size:20px;font-weight:800}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .list-note{
    font-size:12px;color:var(--ink-faint);margin:0 2px 12px;
  }
  .list-foot{
    margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .linklike{
    color:var(--ink-soft);font-size:13px;font-weight:700;
    min-height:44px;display:inline-flex;align-items:center;gap:4px;
  }
  .theme-seg{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.progress{flex:1;height:5px;border-radius:3px;background:var(--line-soft);overflow:hidden;min-width:80px}
.progress i{display:block;height:100%;background:var(--accent);border-radius:3px}
.progress-row,.today-progress{display:flex;align-items:center;gap:10px;margin:8px 0}
.dot-untouched{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--warn);margin-right:8px;vertical-align:1px}
.nudge{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;margin-bottom:10px;border:1px solid var(--warn-line);background:var(--warn-soft);border-radius:var(--r-m);font-size:13px}
.dots{letter-spacing:2px;color:var(--ink-soft);font-size:11px}

  .case-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .case-row{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r-m);
    border-left:4px solid var(--line);
    padding:10px 12px;cursor:pointer;
  }
  .case-row.sev-unstable{border-left-color:var(--danger)}
  .case-row.sev-watcher{border-left-color:var(--warn)}
  .case-row.sev-stable{border-left-color:var(--done)}
  .case-row-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .case-label{font-size:16px;font-weight:700}
  .case-day{font-size:12px;color:var(--ink-faint);white-space:nowrap}
  .case-sum{
    margin-top:2px;font-size:13px;color:var(--ink-soft);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .case-flags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .flag{
    border-radius:999px;padding:3px 9px;font-size:12px;font-weight:700;
    background:var(--surface-2);color:var(--ink-soft);
    display:inline-flex;align-items:center;gap:4px;
  }
  .flag.todo{background:var(--info-soft);color:var(--info)}
  .flag.wait{background:var(--warn-soft);color:var(--warn)}
  .flag.clear{background:var(--done-soft);color:var(--done)}
  .flag.trash{background:var(--danger-soft);color:var(--danger)}
  .flag.severity-stable{background:var(--done-soft);color:var(--done)}
  .flag.severity-watcher{background:var(--warn-soft);color:var(--warn)}
  .flag.severity-unstable{background:var(--danger-soft);color:var(--danger)}
  .empty{
    padding:28px 16px;border:1px dashed var(--line);border-radius:var(--r-m);
    text-align:center;color:var(--ink-faint);background:var(--card)
  }

  .backline{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .backlink{font-size:13px;font-weight:700;color:var(--ink-soft);min-height:44px;display:inline-flex;align-items:center}
  .shell{
    display:grid;grid-template-columns:minmax(0,1.25fr) minmax(300px,.75fr);gap:14px;
    align-items:start;
  }
  .stack{display:flex;flex-direction:column;gap:12px}
  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r-l);
    overflow:hidden;
  }
  .panel-head{
    padding:12px 14px;border-bottom:1px solid var(--line-soft);
    display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap
  }
  .panel-head h2{font-size:15px}
  .panel-sub{font-size:12px;color:var(--ink-faint)}
  .panel-body{padding:12px 14px}

  .case-head .title-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .case-head .title{font-size:18px;line-height:1.25;font-weight:800}
  .case-head .meta{
    margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
    color:var(--ink-soft);font-size:13px;
  }
  .head-actions{display:flex;gap:8px;flex-shrink:0}
  .tabs-bar{
    display:flex;gap:8px;margin-top:12px;overflow-x:auto;
    padding:4px 0;-webkit-overflow-scrolling:touch;
  }
  .tab-btn{flex-shrink:0}
  .tab-btn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .input,.textarea,.select{
    width:100%;border:1px solid var(--line);border-radius:var(--r-m);background:var(--field);
    padding:11px 12px;color:var(--ink);font-size:16px;
  }
  .input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .add-row{display:flex;gap:8px;margin-bottom:12px}
  .add-row .input{flex:1;min-width:0}

  .list{display:flex;flex-direction:column;gap:8px}
  .row-item{
    display:flex;gap:4px;align-items:center;
    border:1px solid var(--line);border-radius:var(--r-m);background:var(--surface-2);
    padding:2px 2px 2px 6px;
  }
  .row-check{
    width:44px;height:44px;border-radius:var(--r-s);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;
    position:relative;
  }
  .row-check::before{
    content:"";width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
    position:absolute;
  }
  .row-check span{position:relative;z-index:1}
  .row-check.done::before{background:var(--done);border-color:var(--done)}
  .row-check.done{color:var(--on-accent)}
  .row-check.wait::before{background:var(--warn);border-color:var(--warn)}
  .row-check.wait{color:var(--on-accent)}
  .row-dot{
    width:22px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  }
  .row-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent-line)}
  .row-input{
    flex:1;min-width:0;border:none;background:transparent;color:var(--ink);
    font-size:16px;font-weight:500;padding:11px 4px;border-radius:var(--r-s);
  }
  .row-input:focus{outline:none;background:var(--field);box-shadow:0 0 0 2px var(--accent-soft)}
  .row-input.muted{text-decoration:line-through;color:var(--ink-faint)}
  .row-del{
    width:44px;height:44px;flex-shrink:0;border-radius:var(--r-s);
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-faint);font-size:18px;
  }
  .inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .compact-btn{
    min-height:36px;padding:0 12px;border-radius:var(--r-s);border:1px solid var(--line);
    background:var(--card);font-size:12px;font-weight:700
  }

  .prob-card{border:1px solid var(--line);border-radius:var(--r-m);background:var(--surface-2);overflow:hidden}
  .prob-top{display:flex;gap:10px;align-items:center;padding:10px}
  .prob-order{font-size:12px;font-weight:800;color:var(--accent);width:26px;flex-shrink:0}
  .prob-title{flex:1;min-width:0}
  .prob-title .input{font-weight:700;background:var(--card)}
  .prob-status{font-size:12px;font-weight:700;border-radius:999px;padding:6px 10px;min-height:36px;background:var(--done-soft);color:var(--done)}
  .prob-status.off{background:var(--surface-2);color:var(--ink-faint);border:1px solid var(--line)}
  .prob-body{padding:0 10px 10px}
  .severity-row{display:flex;gap:8px;flex-wrap:wrap}
  .severity-btn.on{border-color:transparent;color:var(--on-accent)}
  .severity-btn.on.severity-stable{background:var(--done)}
  .severity-btn.on.severity-watcher{background:var(--warn)}
  .severity-btn.on.severity-unstable{background:var(--danger)}

  .collapse{
    border:1px solid var(--line);border-radius:var(--r-m);background:var(--surface-2)
  }
  .collapse-head{
    padding:12px 13px;display:flex;justify-content:space-between;gap:12px;align-items:center
  }
  .collapse-body{padding:0 13px 13px}

  .routine-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .routine-btn{
    min-height:52px;padding:10px 12px;border-radius:var(--r-m);border:1px solid var(--line);
    background:var(--card);text-align:left;display:flex;gap:10px
  }
  .routine-btn.on{background:var(--accent-soft);border-color:var(--accent-line)}
  .routine-box{
    width:18px;height:18px;border-radius:5px;border:2px solid currentColor;display:flex;
    align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:11px
  }
  .routine-copy strong{display:block;font-size:13px}
  .routine-copy span{display:block;font-size:11px;color:var(--ink-faint);margin-top:1px}

  .photo-note{
    margin-top:12px;padding:10px 12px;border-radius:var(--r-m);background:var(--warn-soft);
    border:1px solid var(--warn-line);color:var(--warn);font-size:12px;font-weight:700
  }
  .file-btn{position:relative;overflow:hidden;cursor:pointer}
  .file-btn input{position:absolute;inset:0;opacity:0;width:100%;cursor:pointer}
  .photo-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:12px}
  .photo-card{border:1px solid var(--line);border-radius:var(--r-m);overflow:hidden;background:var(--card)}
  .photo-card img{display:block;width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--surface-2)}
  .photo-actions{padding:8px;display:flex;gap:8px;flex-wrap:wrap}

  .event-list,.med-list{display:flex;flex-direction:column;gap:8px}
  .event-item,.med-item{
    padding:10px 12px;border:1px solid var(--line);border-radius:var(--r-m);background:var(--surface-2)
  }
  .line-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .line-title{font-weight:700}
  .line-sub{font-size:12px;color:var(--ink-soft);margin-top:2px}

  .log-group{display:flex;flex-direction:column;gap:10px}
  .log-card{
    border:1px solid var(--line);border-radius:var(--r-m);background:var(--surface-2);padding:12px
  }
  .log-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}

  .timeline-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--r-m)}
  .timeline{
    min-width:720px;border-collapse:separate;border-spacing:0;width:100%;background:var(--card)
  }
  .timeline th,.timeline td{
    border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
    padding:8px;min-width:40px;vertical-align:middle
  }
  .timeline th:first-child,.timeline td:first-child{
    position:sticky;left:0;background:var(--field);z-index:2;min-width:140px
  }
  .timeline th.today,.timeline td.today{background:var(--accent-soft)}
  .timeline th.today{box-shadow:inset 0 -3px 0 var(--accent)}
  .timeline th.future,.timeline td.future{opacity:.62}
  .timeline td.band-oral{background:var(--info-soft)}
  .timeline td.band-inj{background:var(--warn-soft)}
  .band-tag{display:block;font-size:10px;font-weight:800;text-align:center;color:var(--ink-soft);white-space:nowrap}
  .cell-stack{display:flex;flex-direction:column;gap:4px;align-items:center}
  .event-dot{
    width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--on-accent);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin:0 auto
  }
  .tl-legend{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .legend-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
  .legend-chip.oral{background:var(--info-soft);color:var(--info)}
  .legend-chip.inj{background:var(--warn-soft);color:var(--warn)}
  .legend-chip.ev{background:var(--accent-soft);color:var(--accent)}

  .modal-bg{
    position:fixed;inset:0;background:rgba(10,16,12,.55);
    z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0
  }
  @media(min-width:620px){.modal-bg{align-items:center;padding:20px}}
  .modal{
    width:100%;max-width:560px;max-height:92vh;overflow:auto;
    border-radius:var(--r-l) var(--r-l) 0 0;background:var(--card);padding:20px;
    padding-bottom:calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 40px rgba(0,0,0,.25)
  }
  @media(min-width:620px){.modal{border-radius:var(--r-l);padding-bottom:20px}}
  .modal h3{font-size:20px}
  .modal p.sub{margin-top:6px;margin-bottom:16px}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}

  .save-line{margin-top:10px;font-size:12px;color:var(--ink-faint)}
  .toast{
    position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:12px 16px;border-radius:var(--r-m);
    box-shadow:0 10px 32px rgba(0,0,0,.25);opacity:0;transition:.22s;z-index:110;pointer-events:none;
    max-width:calc(100vw - 32px);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:920px){
    .shell{grid-template-columns:1fr}
    .case-grid{grid-template-columns:1fr}
  }
  @media(max-width:640px){
    .topbar{position:static}
    .topbar .header-actions{display:none}
    .bottombar{display:block}
    body{padding-bottom:calc(88px + env(safe-area-inset-bottom))}
    .tabs-bar{
      position:sticky;top:0;z-index:40;
      background:var(--paper);
      margin:12px -14px 0;padding:8px 14px;
      border-bottom:1px solid var(--line-soft);
    }
    .toast{bottom:calc(88px + env(safe-area-inset-bottom))}
  }
  @media(max-width:520px){
    main{padding:12px 14px}
    .topbar-in{padding:8px 14px}
    .routine-grid,.modal-grid,.photo-grid{grid-template-columns:1fr}
    .panel-head,.panel-body{padding-left:12px;padding-right:12px}
  }

</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-in">
      <div class="brand" onclick="go('list')">
        <strong>Casebook</strong>
      </div>
      <div class="spacer"></div>
      <div class="header-actions">
        <button class="pill-btn" onclick="go('week')">Week</button>
        <button class="pill-btn" onclick="copyDailyExport()">
          Export
          <span class="count-badge" data-count="export">0</span>
        </button>
        <button class="pill-btn" onclick="go('trash')">
          Trash
          <span class="count-badge" data-count="trash">0</span>
        </button>
      </div>
    </div>
  </div>

  <main id="app"></main>

  <nav class="bottombar">
    <div class="bottombar-in">
      <button class="bnav" data-nav="list" onclick="go('list')"><span class="ico">▤</span>List</button>
      <button class="bnav" data-nav="week" onclick="go('week')"><span class="ico">▦</span>Week</button>
      <button class="bnav" onclick="newCaseModal()"><span class="ico">＋</span>New</button>
      <button class="bnav" onclick="copyDailyExport()"><span class="ico">⧉</span>Export<span class="count-badge" data-count="export">0</span></button>
    </div>
  </nav>
  <div id="modalMount"></div>
  <div id="toast" class="toast"></div>

<script id="logic">
function logicFactory(){
  const SEVERITY_LABELS = { stable:"安定", watcher:"要注意", unstable:"不安定" };
  const MED_ROUTE_LABELS = { oral:"内服", inj:"注射" };
  const EVENT_TYPE_LABELS = { test:"検査", surgery:"手術", procedure:"処置", treatment:"治療", followup:"外来F/U", other:"その他" };
  const ROUTINE = [
    {k:"meds", t:"休薬・内服調整", h:"抗血栓薬・DM薬・サプリ"},
    {k:"allergy", t:"アレルギー・予防接種", h:"FA/DA・肺炎球菌等"},
    {k:"sdm", t:"意思決定支援", h:"家族・代理決定者・ゴール"},
    {k:"code", t:"Code status", h:"急変時方針（暫定）"},
    {k:"outlook", t:"入院後の見通し", h:"推定在院日数・退院方向"},
    {k:"bps", t:"BPSモデル", h:"心理・社会・Matters Most"},
    {k:"deepin", t:"DEEP-IN＋CFS", h:"高齢者機能評価"},
    {k:"risk", t:"リスクスクリーニング", h:"嚥下・転倒・褥瘡・VTE・抑制"},
    {k:"rehab", t:"リハGoal", h:"病前ADL・退院先・退院基準"},
    {k:"acp", t:"退院支援・ACP", h:"多職種・介護保険・IC"}
  ];
  // 退院チェックリスト（カルテに各文書・手配を済ませたかの確認。二重記録禁止は維持）
  const DC_ROUTINE = [
    {k:"summary", t:"退院サマリ", h:"作成・提出"},
    {k:"rx", t:"退院時処方", h:"処方・残数確認"},
    {k:"careplan", t:"退院療養計画書", h:"交付・説明"},
    {k:"referral", t:"診療情報提供書", h:"かかりつけ・転院先"},
    {k:"followup", t:"外来フォロー予約", h:"予約日・担当"},
    {k:"explain", t:"本人・家族への説明", h:"退院日・注意点"},
    {k:"resources", t:"介護・社会資源調整", h:"ケアマネ・訪問系・MSW"}
  ];

  function makeId(){
    return Math.random().toString(36).slice(2,10);
  }

  function isoNow(){
    return new Date().toISOString();
  }

  function makeEmptyDay(date){
    return { date, todos:[], waits:[], hooks:[], rxInjected:false };
  }

  function dayNumber(caseObj, today){
    if(!caseObj || !caseObj.admittedAt || !today){ return 1; }
    const start = new Date(caseObj.admittedAt + "T00:00:00");
    const end = new Date(today + "T00:00:00");
    const diff = Math.floor((end - start) / 86400000);
    return Number.isFinite(diff) && diff >= 0 ? diff + 1 : 1;
  }

  function normalizeRoutine(routine){
    const source = routine && typeof routine === "object" ? routine : {};
    const next = {};
    ROUTINE.forEach(function(item){
      next[item.k] = !!source[item.k];
    });
    if(source.vte || source.delirium || source.risk){ next.risk = true; }
    if(source.disposition || source.rehab){ next.rehab = true; }
    return next;
  }

  function normalizeDcChecklist(obj){
    const source = obj && typeof obj === "object" ? obj : {};
    const next = {};
    DC_ROUTINE.forEach(function(item){
      next[item.k] = !!source[item.k];
    });
    return next;
  }

  function routineLabels(routine){
    const safe = normalizeRoutine(routine);
    return ROUTINE.filter(function(item){ return !!safe[item.k]; }).map(function(item){ return item.t; });
  }

  function ensureCaseShape(caseObj){
    const base = {
      id:makeId(),
      createdAt:Date.now(),
      status:"active",
      deletedAt:null,
      severity:"",
      ageBand:"",
      sex:"",
      cc:"",
      room:"",
      admittedAt:"",
      dischargedAt:null,
      plannedDischargeAt:"",
      admission:{ note:"", photoIds:[], routine:{} },
      dischargeChecklist:{},
      patientSummary:"",
      contingency:[],
      problems:[],
      meds:[],
      events:[],
      days:[],
      summary:{ course:"", outcome:"", myPractice:"" },
      lastExportedAt:null
    };
    const out = Object.assign({}, base, caseObj || {});
    out.admission = Object.assign({}, base.admission, out.admission || {});
    out.admission.photoIds = Array.isArray(out.admission.photoIds) ? out.admission.photoIds.slice() : [];
    out.admission.routine = normalizeRoutine(out.admission.routine);
    out.dischargeChecklist = normalizeDcChecklist(out.dischargeChecklist);
    out.patientSummary = typeof out.patientSummary === "string" ? out.patientSummary : "";
    // 部屋番号は識別性の低い運用情報のみ（氏名不可）。書き出しには載せない
    out.room = typeof out.room === "string" ? out.room : "";
    out.plannedDischargeAt = typeof out.plannedDischargeAt === "string" ? out.plannedDischargeAt : "";
    out.contingency = Array.isArray(out.contingency) ? out.contingency.map(function(item){
      return { id:item && item.id ? item.id : makeId(), text:item && item.text ? String(item.text) : "" };
    }).filter(function(item){ return item.text; }) : [];
    out.problems = Array.isArray(out.problems) ? out.problems.map(function(p){
      return { id:p.id || makeId(), title:p.title || "", assessment:p.assessment || "", active:p.active !== false };
    }) : [];
    out.meds = Array.isArray(out.meds) ? out.meds.map(function(m){
      return {
        id:m.id || makeId(),
        name:m.name || "",
        route:m.route === "inj" ? "inj" : "oral",
        startDate:m.startDate || "",
        endDate:m.endDate || null,
        note:m.note || ""
      };
    }) : [];
    out.events = Array.isArray(out.events) ? out.events.map(function(e){
      return {
        id:e.id || makeId(),
        date:e.date || "",
        type:EVENT_TYPE_LABELS[e.type] ? e.type : "other",
        title:e.title || "",
        note:e.note || ""
      };
    }) : [];
    out.days = Array.isArray(out.days) ? out.days.map(function(d){
      const day = Object.assign(makeEmptyDay(d.date || ""), d || {});
      delete day.collect;
      day.rxInjected = !!day.rxInjected;
      // src（"rx"/"order"）と promoted は v8.1 の構造化属性。ここで落とすと静かにデータが消えるので明示的に保全
      day.todos = Array.isArray(day.todos) ? day.todos.map(function(t){ return { id:t.id || makeId(), text:t.text || "", done:!!t.done, src:typeof t.src === "string" ? t.src : "", promoted:!!t.promoted }; }) : [];
      day.waits = Array.isArray(day.waits) ? day.waits.map(function(w){ return { id:w.id || makeId(), text:w.text || "", resolved:!!w.resolved, src:typeof w.src === "string" ? w.src : "" }; }) : [];
      day.hooks = Array.isArray(day.hooks) ? day.hooks.map(function(h){ return { id:h.id || makeId(), text:h.text || "" }; }) : [];
      return day;
    }).sort(function(a,b){ return a.date.localeCompare(b.date); }) : [];
    out.summary = Object.assign({}, base.summary, out.summary || {});
    return out;
  }

  function normalizeData(data){
    const safe = data && typeof data === "object" ? data : {};
    return {
      version:2,
      cases:Array.isArray(safe.cases) ? safe.cases.map(ensureCaseShape) : []
    };
  }

  function getDay(caseObj, date){
    if(!caseObj || !Array.isArray(caseObj.days)){ return null; }
    for(var i=0;i<caseObj.days.length;i+=1){
      if(caseObj.days[i].date === date){ return caseObj.days[i]; }
    }
    return null;
  }

  function getLatestDay(caseObj){
    if(!caseObj || !Array.isArray(caseObj.days) || !caseObj.days.length){ return null; }
    return caseObj.days[caseObj.days.length - 1];
  }

  // 内容（todos/waits/hooks いずれか）のある最終日。全て空なら最終日。
  // 退院後に空の当日 day が追記されてしまった既存データでも、退院書き出し・
  // 未完了表示が実データの最終日を見るための救済を兼ねる
  function getLastMeaningfulDay(caseObj){
    if(!caseObj || !Array.isArray(caseObj.days) || !caseObj.days.length){ return null; }
    for(var i = caseObj.days.length - 1; i >= 0; i -= 1){
      var d = caseObj.days[i];
      if((d.todos && d.todos.length) || (d.waits && d.waits.length) || (d.hooks && d.hooks.length)){ return d; }
    }
    return caseObj.days[caseObj.days.length - 1];
  }

  function ensureTodayDay(caseObj, today){
    var existing = getDay(caseObj, today);
    if(existing){ return existing; }
    var day = makeEmptyDay(today);
    caseObj.days.push(day);
    caseObj.days.sort(function(a,b){ return a.date.localeCompare(b.date); });
    return getDay(caseObj, today);
  }

  function rolloverCase(caseObj, today){
    var c = ensureCaseShape(caseObj);
    var existing = getDay(c, today);
    if(existing){ return c; }
    var latest = getLatestDay(c);
    if(!latest || !latest.date || latest.date >= today){
      c.days.push(makeEmptyDay(today));
      c.days.sort(function(a,b){ return a.date.localeCompare(b.date); });
      return c;
    }
    var nextDay = makeEmptyDay(today);
    nextDay.todos = latest.todos.filter(function(t){ return !t.done; }).map(function(t){
      return { id:makeId(), text:t.text, done:false, src:typeof t.src === "string" ? t.src : "", promoted:!!t.promoted };
    });
    nextDay.waits = latest.waits.filter(function(w){ return !w.resolved; }).map(function(w){
      return { id:makeId(), text:w.text, resolved:false, src:typeof w.src === "string" ? w.src : "" };
    });
    c.days.push(nextDay);
    c.days.sort(function(a,b){ return a.date.localeCompare(b.date); });
    return c;
  }

  // 検査オーダーの2段階目（done → Waiting へ自動生成）のテキスト
  function orderWaitText(text){
    return "結果確認: " + text;
  }

  // 定期処方の曜日リマインド: 当日が設定曜日なら「定期処方の確認」To Do を1回だけ注入。
  // rxInjected でユーザー削除後の再注入を防ぎ、繰越で既に居る場合は重複させない
  function injectRxTodo(caseObj, today, weekdays){
    if(!caseObj || caseObj.status !== "active" || caseObj.deletedAt){ return false; }
    if(!Array.isArray(weekdays) || !weekdays.length){ return false; }
    var dow = new Date(today + "T12:00:00").getDay();
    if(weekdays.indexOf(dow) === -1){ return false; }
    var day = getDay(caseObj, today);
    if(!day || day.rxInjected){ return false; }
    day.rxInjected = true;
    if(day.todos.some(function(t){ return t.src === "rx" && !t.done; })){ return false; }
    day.todos.push({ id:makeId(), text:"定期処方の確認", done:false, src:"rx", promoted:false });
    return true;
  }

  // 退院予定日の当日判定（アプリを開いた時に発火）。発火時に予定日をクリアして
  // 「入院中へ戻す」→次回起動で再退院、のループを防ぐ
  function applyPlannedDischarge(caseObj, today){
    if(!caseObj || caseObj.status !== "active" || caseObj.deletedAt){ return false; }
    if(!caseObj.plannedDischargeAt || caseObj.plannedDischargeAt > today){ return false; }
    caseObj.status = "discharged";
    caseObj.dischargedAt = caseObj.plannedDischargeAt;
    caseObj.plannedDischargeAt = "";
    return true;
  }

  function purgeTrash(data, todayIso){
    var model = normalizeData(data);
    var cutoff = new Date(todayIso + "T00:00:00").getTime() - 30 * 86400000;
    var purgedCaseIds = [];
    model.cases = model.cases.filter(function(caseObj){
      if(!caseObj.deletedAt){ return true; }
      var ts = new Date(caseObj.deletedAt).getTime();
      if(Number.isFinite(ts) && ts < cutoff){
        purgedCaseIds.push(caseObj.id);
        return false;
      }
      return true;
    });
    return { data:model, purgedCaseIds:purgedCaseIds };
  }

  function formatLabel(caseObj){
    var sex = caseObj.sex === "M" ? "男性" : caseObj.sex === "F" ? "女性" : "";
    return [caseObj.ageBand, sex, caseObj.cc].filter(Boolean).join("・");
  }

  function latestChangeItems(caseObj, today){
    return {
      meds:caseObj.meds.filter(function(m){ return m.startDate === today || m.endDate === today; }),
      events:caseObj.events.filter(function(e){ return e.date === today; })
    };
  }

  function severityLabel(severity){
    return SEVERITY_LABELS[severity] || "";
  }

  function buildDailyExport(data, today){
    var model = normalizeData(data);
    var lines = ["# Casebook Export " + today];
    model.cases.filter(function(c){ return c.status === "active" && !c.deletedAt; }).forEach(function(caseObj){
      var day = getDay(caseObj, today) || makeEmptyDay(today);
      var changes = latestChangeItems(caseObj, today);
      var sev = severityLabel(caseObj.severity);
      lines.push("## Case: " + (sev ? "【" + sev + "】" : "") + formatLabel(caseObj) + "（病日" + dayNumber(caseObj, today) + "）");
      if(caseObj.patientSummary){
        lines.push("P: " + caseObj.patientSummary.replace(/\n/g, " "));
      }
      if(caseObj.plannedDischargeAt){
        lines.push("- 退院予定: " + caseObj.plannedDischargeAt);
      }
      lines.push("### Problem List");
      var activeProblems = caseObj.problems.filter(function(p){ return p.active !== false && p.title; });
      if(activeProblems.length){
        activeProblems.forEach(function(problem, index){
          var text = "- #" + (index + 1) + " " + problem.title;
          if(problem.assessment){ text += " — A: " + problem.assessment.replace(/\n/g, " "); }
          lines.push(text);
        });
      } else {
        lines.push("- なし");
      }
      lines.push("### To Do");
      if(day.todos.length){ day.todos.forEach(function(todo){ lines.push("- [" + (todo.done ? "x" : " ") + "] " + todo.text); }); }
      else { lines.push("- なし"); }
      lines.push("### Waiting");
      if(day.waits.length){ day.waits.forEach(function(wait){ lines.push("- [" + (wait.resolved ? "x" : " ") + "] " + wait.text); }); }
      else { lines.push("- なし"); }
      lines.push("### Contingency Plan");
      if(caseObj.contingency.length){ caseObj.contingency.forEach(function(item){ lines.push("- " + item.text); }); }
      else { lines.push("- なし"); }
      lines.push("### Hooks");
      if(day.hooks.length){ day.hooks.forEach(function(hook){ lines.push("- " + hook.text); }); }
      else { lines.push("- なし"); }
      lines.push("### Medications & Events（本日変更分）");
      if(!changes.meds.length && !changes.events.length){
        lines.push("- 変更なし");
      } else {
        changes.meds.forEach(function(med){
          var head = med.startDate === today ? "開始" : "終了";
          var end = med.endDate ? "〜" + med.endDate.slice(5).replace("-", "/") : "〜";
          lines.push("- " + head + ": " + med.name + " " + MED_ROUTE_LABELS[med.route] + "（" + med.startDate.slice(5).replace("-", "/") + end + "）");
        });
        changes.events.forEach(function(eventObj){
          lines.push("- イベント: " + eventObj.date.slice(5).replace("-", "/") + " " + EVENT_TYPE_LABELS[eventObj.type] + " " + eventObj.title);
        });
      }
      lines.push("### Photos");
      lines.push("- 入院時写真 " + caseObj.admission.photoIds.length + "枚 → Obsidian へ共有済みのものを /casebook が OCR");
    });
    return lines.join("\n");
  }

  function buildDischargeExport(caseObj){
    var c = ensureCaseShape(caseObj);
    var routineList = routineLabels(c.admission.routine);
    var lines = [
      "---",
      "type: casebook-discharge",
      "date: " + (c.dischargedAt || c.admittedAt || ""),
      "label: " + formatLabel(c),
      "---",
      "",
      "# " + formatLabel(c),
      "",
      "## Admission Period",
      "- 入院日: " + (c.admittedAt || ""),
      "- 退院日: " + (c.dischargedAt || ""),
      "- 重症度: " + (severityLabel(c.severity) || "未設定"),
      "",
      "## Patient Summary",
      c.patientSummary || "- なし",
      "",
      "## Admission Note",
      c.admission.note || "- なし",
      "",
      "## Routine",
    ];
    if(routineList.length){ routineList.forEach(function(label){ lines.push("- " + label); }); }
    else { lines.push("- なし"); }
    lines.push("");
    lines.push("## Discharge Checklist");
    DC_ROUTINE.forEach(function(item){
      lines.push("- [" + (c.dischargeChecklist[item.k] ? "x" : " ") + "] " + item.t);
    });
    lines.push("");
    lines.push("## Problem List");
    if(c.problems.length){
      c.problems.forEach(function(problem, index){
        lines.push("### #" + (index + 1) + " " + (problem.title || "未設定"));
        if(problem.assessment){ lines.push(problem.assessment); }
        lines.push("");
      });
    } else {
      lines.push("- なし");
      lines.push("");
    }
    lines.push("## Daily Log");
    if(c.days.length){
      c.days.forEach(function(day){
        lines.push("### " + day.date);
        if(day.todos.length){ day.todos.forEach(function(todo){ lines.push("- Todo [" + (todo.done ? "x" : " ") + "] " + todo.text); }); }
        if(day.waits.length){ day.waits.forEach(function(wait){ lines.push("- Wait [" + (wait.resolved ? "x" : " ") + "] " + wait.text); }); }
        if(day.hooks.length){ day.hooks.forEach(function(hook){ lines.push("- Hook " + hook.text); }); }
        lines.push("");
      });
    } else {
      lines.push("- なし");
      lines.push("");
    }
    lines.push("## Medications");
    if(c.meds.length){
      c.meds.forEach(function(med){
        lines.push("- " + med.name + " / " + MED_ROUTE_LABELS[med.route] + " / " + med.startDate + "〜" + (med.endDate || "継続中") + (med.note ? " / " + med.note.replace(/\n/g, " ") : ""));
      });
    } else {
      lines.push("- なし");
    }
    lines.push("");
    lines.push("## Events");
    if(c.events.length){
      c.events.forEach(function(eventObj){
        lines.push("- " + eventObj.date + " / " + EVENT_TYPE_LABELS[eventObj.type] + " / " + eventObj.title + (eventObj.note ? " / " + eventObj.note.replace(/\n/g, " ") : ""));
      });
    } else {
      lines.push("- なし");
    }
    lines.push("");
    lines.push("## Discharge Summary");
    lines.push("### Course");
    lines.push(c.summary.course || "");
    lines.push("");
    lines.push("### My Practice");
    lines.push(c.summary.myPractice || "");
    lines.push("");
    lines.push("### Outcome");
    lines.push(c.summary.outcome || "");
    lines.push("");
    lines.push("## Unresolved Waiting");
    var lastDay = getLastMeaningfulDay(c);
    var pendingWaits = lastDay ? lastDay.waits.filter(function(wait){ return !wait.resolved && wait.text; }).map(function(wait){ return wait.text; }) : [];
    if(pendingWaits.length){
      pendingWaits.forEach(function(text){ lines.push("- " + text); });
    } else {
      lines.push("- なし");
    }
    lines.push("");
    lines.push("## Unresolved To Do");
    var pendingTodos = lastDay ? lastDay.todos.filter(function(todo){ return !todo.done && todo.text; }).map(function(todo){ return todo.text; }) : [];
    if(pendingTodos.length){
      pendingTodos.forEach(function(text){ lines.push("- " + text); });
    } else {
      lines.push("- なし");
    }
    return lines.join("\n");
  }

  // バックアップ JSON の検証（写真は対象外）。復元は呼び出し側で確認を挟む
  function parseBackup(raw){
    var payload;
    try { payload = JSON.parse(raw); } catch(_e){ return { ok:false, error:"JSONとして読めません" }; }
    if(!payload || payload.app !== "casebook" || !payload.data || typeof payload.data !== "object"){
      return { ok:false, error:"Casebook のバックアップファイルではありません" };
    }
    return {
      ok:true,
      data:normalizeData(payload.data),
      stats:payload.stats && typeof payload.stats === "object" && payload.stats.days ? payload.stats : null,
      theme:typeof payload.theme === "string" ? payload.theme : "",
      settings:payload.settings && typeof payload.settings === "object" ? payload.settings : null,
      exportedAt:typeof payload.exportedAt === "string" ? payload.exportedAt : ""
    };
  }

  function prevDateISO(iso){
    var d = new Date(iso + "T12:00:00");
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0, 10);
  }

  function nextDateISO(iso){
    var d = new Date(iso + "T12:00:00");
    d.setDate(d.getDate() + 1);
    return d.toISOString().slice(0, 10);
  }

  // 週間予定: 今日から span 日、日付ごとに①アクティブ症例のイベント（全種別）
  // ②退院予定 ③退院済み症例の外来F/U を集める
  function buildWeekItems(data, today, span){
    var model = normalizeData(data);
    var days = [];
    var cur = today;
    for(var i = 0; i < (span || 7); i += 1){
      days.push({ date:cur, items:[] });
      cur = nextDateISO(cur);
    }
    var byDate = {};
    days.forEach(function(d){ byDate[d.date] = d; });
    model.cases.forEach(function(caseObj){
      if(caseObj.deletedAt){ return; }
      var label = formatLabel(caseObj) || "未設定";
      var active = caseObj.status === "active";
      caseObj.events.forEach(function(eventObj){
        if(!byDate[eventObj.date]){ return; }
        if(!active && eventObj.type !== "followup"){ return; }
        byDate[eventObj.date].items.push({
          caseId:caseObj.id,
          label:label,
          kind:eventObj.type,
          text:EVENT_TYPE_LABELS[eventObj.type] + " " + eventObj.title
        });
      });
      if(active && caseObj.plannedDischargeAt && byDate[caseObj.plannedDischargeAt]){
        byDate[caseObj.plannedDischargeAt].items.push({ caseId:caseObj.id, label:label, kind:"discharge", text:"退院予定" });
      }
    });
    return days;
  }

  function computeStreak(exportedDates, today){
    var set = {};
    (exportedDates || []).forEach(function(date){ set[date] = true; });
    var cur = set[today] ? today : prevDateISO(today);
    var n = 0;
    while(set[cur]){ n += 1; cur = prevDateISO(cur); }
    return n;
  }

  function pruneStatsDays(days, today, keepDays){
    var d = new Date(today + "T12:00:00");
    d.setDate(d.getDate() - (keepDays || 90));
    var cutoff = d.toISOString().slice(0, 10);
    var out = {};
    Object.keys(days || {}).forEach(function(date){
      if(/^\d{4}-\d{2}-\d{2}$/.test(date) && date >= cutoff){ out[date] = days[date]; }
    });
    return out;
  }

  return {
    SEVERITY_LABELS:SEVERITY_LABELS,
    MED_ROUTE_LABELS:MED_ROUTE_LABELS,
    EVENT_TYPE_LABELS:EVENT_TYPE_LABELS,
    ROUTINE:ROUTINE,
    DC_ROUTINE:DC_ROUTINE,
    normalizeDcChecklist:normalizeDcChecklist,
    makeId:makeId,
    isoNow:isoNow,
    makeEmptyDay:makeEmptyDay,
    ensureCaseShape:ensureCaseShape,
    normalizeData:normalizeData,
    getDay:getDay,
    getLatestDay:getLatestDay,
    getLastMeaningfulDay:getLastMeaningfulDay,
    ensureTodayDay:ensureTodayDay,
    rolloverCase:rolloverCase,
    injectRxTodo:injectRxTodo,
    orderWaitText:orderWaitText,
    applyPlannedDischarge:applyPlannedDischarge,
    purgeTrash:purgeTrash,
    formatLabel:formatLabel,
    severityLabel:severityLabel,
    routineLabels:routineLabels,
    dayNumber:dayNumber,
    buildDailyExport:buildDailyExport,
    buildDischargeExport:buildDischargeExport,
    parseBackup:parseBackup,
    prevDateISO:prevDateISO,
    nextDateISO:nextDateISO,
    buildWeekItems:buildWeekItems,
    computeStreak:computeStreak,
    pruneStatsDays:pruneStatsDays
  };
}
var LOGIC = logicFactory();
if(typeof module !== "undefined"){ module.exports = LOGIC; }
</script>

<script>
const KEY = "casebook:v2";
const PHOTO_DB = "casebook-photos";
const PHOTO_STORE = "photos";
const ROUTINE = LOGIC.ROUTINE;
const DC_ROUTINE = LOGIC.DC_ROUTINE;
// ローカル日付（toISOString は UTC のため JST では 09:00 に日付が変わる不具合があった）
const todayISO = () => {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
};
const esc = (s) => String(s || "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const timeLabel = (iso) => new Date(iso).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

const Store = {
  mem:null,
  empty(){ return { version:2, cases:[] }; },
  async load(){
    if(window.storage && typeof window.storage.get === "function"){
      try{
        const res = await window.storage.get(KEY);
        const data = res && res.value ? JSON.parse(res.value) : this.empty();
        this.mem = LOGIC.normalizeData(data);
        return this.mem;
      }catch(_e){}
    }
    try{
      const raw = localStorage.getItem(KEY);
      const data = raw ? JSON.parse(raw) : this.empty();
      this.mem = LOGIC.normalizeData(data);
      return this.mem;
    }catch(_e){}
    return this.mem || this.empty();
  },
  async save(data){
    this.mem = LOGIC.normalizeData(data);
    const payload = JSON.stringify(this.mem);
    if(window.storage && typeof window.storage.set === "function"){
      try{
        await window.storage.set(KEY, payload);
        return true;
      }catch(_e){}
    }
    try{
      localStorage.setItem(KEY, payload);
      return true;
    }catch(_e){}
    return false;
  }
};

const Photos = {
  dbp:null,
  async db(){
    if(this.dbp){ return this.dbp; }
    this.dbp = new Promise((resolve, reject) => {
      const req = indexedDB.open(PHOTO_DB, 1);
      req.onupgradeneeded = function(){
        const db = req.result;
        const store = db.createObjectStore(PHOTO_STORE, { keyPath:"id" });
        store.createIndex("caseId", "caseId", { unique:false });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return this.dbp;
  },
  async add(caseId, blob){
    const db = await this.db();
    const record = { id:LOGIC.makeId(), caseId, blob, createdAt:new Date().toISOString() };
    await new Promise((resolve, reject) => {
      const tx = db.transaction(PHOTO_STORE, "readwrite");
      tx.objectStore(PHOTO_STORE).add(record);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
    return record.id;
  },
  async get(id){
    const db = await this.db();
    return new Promise((resolve, reject) => {
      const req = db.transaction(PHOTO_STORE, "readonly").objectStore(PHOTO_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },
  async remove(id){
    const db = await this.db();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(PHOTO_STORE, "readwrite");
      tx.objectStore(PHOTO_STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async removeByCase(caseId){
    const db = await this.db();
    const ids = await new Promise((resolve, reject) => {
      const tx = db.transaction(PHOTO_STORE, "readonly");
      const idx = tx.objectStore(PHOTO_STORE).index("caseId");
      const req = idx.getAll(caseId);
      req.onsuccess = () => resolve((req.result || []).map((x) => x.id));
      req.onerror = () => reject(req.error);
    });
    for(const id of ids){ await this.remove(id); }
  }
};

// 自動バックアップ（写真DBとは独立のDB。既存 casebook-photos の version bump 事故を避ける）
const BACKUP_DB = "casebook-backups";
const BACKUP_STORE = "snapshots";
const BACKUP_KEEP = 7;

const Backups = {
  dbp:null,
  async db(){
    if(this.dbp){ return this.dbp; }
    this.dbp = new Promise((resolve, reject) => {
      const req = indexedDB.open(BACKUP_DB, 1);
      req.onupgradeneeded = function(){
        req.result.createObjectStore(BACKUP_STORE, { keyPath:"date" });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return this.dbp;
  },
  async get(date){
    const db = await this.db();
    return new Promise((resolve, reject) => {
      const req = db.transaction(BACKUP_STORE, "readonly").objectStore(BACKUP_STORE).get(date);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },
  async put(date, payload){
    const db = await this.db();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(BACKUP_STORE, "readwrite");
      tx.objectStore(BACKUP_STORE).put({ date, payload, createdAt:LOGIC.isoNow() });
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async keys(){
    const db = await this.db();
    return new Promise((resolve, reject) => {
      const req = db.transaction(BACKUP_STORE, "readonly").objectStore(BACKUP_STORE).getAllKeys();
      req.onsuccess = () => resolve((req.result || []).slice().sort());
      req.onerror = () => reject(req.error);
    });
  },
  async remove(date){
    const db = await this.db();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(BACKUP_STORE, "readwrite");
      tx.objectStore(BACKUP_STORE).delete(date);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async prune(){
    const keys = await this.keys();
    const excess = keys.slice(0, Math.max(0, keys.length - BACKUP_KEEP));
    for(const k of excess){ await this.remove(k); }
  },
  // 1日1回、その日最初に開いた時点の状態を保存。force=true は復元直前の退避用
  async snapshotToday(force){
    const date = todayISO();
    if(!force){
      const existing = await this.get(date);
      if(existing){ return false; }
    }
    await this.put(date, JSON.stringify(buildBackupPayload()));
    await this.prune();
    return true;
  }
};

let DB = Store.empty();
let VIEW = { name:"list", caseId:null, tab:"today", filter:"active" };
let SAVE_OK = true;

// テーマ（auto/light/dark）。設定は保存キーと別の localStorage キーに置く（casebook:v2 は不変）
const THEME_KEY = "casebook:theme";
let THEME = "auto";
try { THEME = localStorage.getItem(THEME_KEY) || "auto"; } catch(e) {}
if(!["auto","light","dark"].includes(THEME)){ THEME = "auto"; }
const DARK_MQ = (typeof window !== "undefined" && window.matchMedia) ? window.matchMedia("(prefers-color-scheme: dark)") : null;

function resolvedTheme(){
  if(THEME === "auto"){ return DARK_MQ && DARK_MQ.matches ? "dark" : "light"; }
  return THEME;
}

function applyTheme(){
  const mode = resolvedTheme();
  document.documentElement.dataset.theme = mode;
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta){ meta.content = mode === "dark" ? "#151515" : "#f3f5f3"; }
}

function setTheme(mode){
  THEME = mode;
  try { localStorage.setItem(THEME_KEY, mode); } catch(e) {}
  applyTheme();
  render();
}

if(DARK_MQ && DARK_MQ.addEventListener){
  DARK_MQ.addEventListener("change", () => { if(THEME === "auto"){ applyTheme(); } });
}
applyTheme();

// v8.1 全体設定（保存キーと別の casebook:settings。現状は定期処方曜日のみ）
const SETTINGS_KEY = "casebook:settings";
let SETTINGS = { rxWeekdays: [] };
try {
  const rawSettings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "null");
  if(rawSettings && typeof rawSettings === "object" && Array.isArray(rawSettings.rxWeekdays)){
    SETTINGS.rxWeekdays = rawSettings.rxWeekdays.filter((n) => Number.isInteger(n) && n >= 0 && n <= 6);
  }
} catch(e) {}

function saveSettings(){
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(SETTINGS)); } catch(e) {}
}

// v7 ゲーミフィケーション統計（記録・学習行動のみ。患者情報は一切含まない）
// 保存キーは casebook:v2 と別の casebook:stats（テーマと同方式）
const STATS_KEY = "casebook:stats";
let STATS = { days:{}, totals:{ recordDays:0 } };
try {
  const rawStats = JSON.parse(localStorage.getItem(STATS_KEY) || "null");
  if(rawStats && typeof rawStats === "object" && rawStats.days){
    STATS = { days:rawStats.days, totals:Object.assign({ recordDays:0 }, rawStats.totals) };
  }
} catch(e) {}

function saveStats(){
  STATS.days = LOGIC.pruneStatsDays(STATS.days, todayISO(), 90);
  try { localStorage.setItem(STATS_KEY, JSON.stringify(STATS)); } catch(e) {}
}

function statsDay(date){
  if(!STATS.days[date]){
    STATS.days[date] = { touched:[], exported:false };
    STATS.totals.recordDays = (STATS.totals.recordDays || 0) + 1;
  }
  return STATS.days[date];
}

function markCaseTouched(caseId){
  if(!caseId){ return; }
  const d = statsDay(todayISO());
  if(d.touched.indexOf(caseId) === -1){ d.touched.push(caseId); saveStats(); }
}

function markExportedToday(){
  statsDay(todayISO()).exported = true;
  saveStats();
}

function touchedToday(caseId){
  const d = STATS.days[todayISO()];
  return !!(d && d.touched.indexOf(caseId) !== -1);
}

function exportedOn(date){
  const d = STATS.days[date];
  return !!(d && d.exported);
}

function exportStreak(){
  const dates = Object.keys(STATS.days).filter(exportedOn);
  return LOGIC.computeStreak(dates, todayISO());
}

function exportDotRow(){
  const cells = [];
  let cur = todayISO();
  for(let i = 0; i < 14; i += 1){
    cells.unshift(exportedOn(cur) ? "●" : "○");
    cur = LOGIC.prevDateISO(cur);
  }
  return cells.join("");
}

const EXPORT_MESSAGES = [
  "今日も一巡、おつかれさまです",
  "記録が資産になっていきます",
  "あとは /casebook に任せましょう",
  "今日の分は今日のうちに。良い習慣です",
  "夜のループ、閉じました"
];

let LAST_SAVE_AT = null;
let saveTimer = null;
let toastTimer = null;
let PHOTO_URLS = {};

function debounce(fn, wait){
  return function(){
    const args = arguments;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => fn.apply(null, args), wait);
  };
}

function findCase(id){
  return DB.cases.find((c) => c.id === id) || null;
}

function activeCases(){
  return DB.cases.filter((c) => !c.deletedAt && c.status === "active");
}

function trashCases(){
  return DB.cases.filter((c) => !!c.deletedAt);
}

function visibleCases(){
  return DB.cases.filter((c) => {
    if(c.deletedAt){ return false; }
    if(VIEW.filter === "all"){ return true; }
    return c.status === VIEW.filter;
  });
}

function currentCase(){
  return findCase(VIEW.caseId);
}

// active のみ当日 day を確保。discharged は days を変更せず「内容のある最終日」を
// 参照する（v7 まで一覧描画だけで退院済み症例に空の当日 day が追記されるバグがあった）
function currentDay(caseObj){
  if(caseObj.status === "active" && !caseObj.deletedAt){
    return LOGIC.ensureTodayDay(caseObj, todayISO());
  }
  return LOGIC.getLastMeaningfulDay(caseObj) || LOGIC.makeEmptyDay(todayISO());
}

function renderSaveMeta(){
  if(!LAST_SAVE_AT){ return SAVE_OK ? "未保存の変更なし" : "保存先に書き込めません"; }
  return SAVE_OK ? "保存しました " + timeLabel(LAST_SAVE_AT) : "保存に失敗しました";
}

function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

function refreshCounts(){
  const trashN = String(trashCases().length);
  const exportN = String(activeCases().length);
  document.querySelectorAll('[data-count="trash"]').forEach((el) => { el.textContent = trashN; });
  document.querySelectorAll('[data-count="export"]').forEach((el) => { el.textContent = exportN; });
}

function refreshNav(){
  document.querySelectorAll("[data-nav]").forEach((el) => {
    el.classList.toggle("on", el.dataset.nav === VIEW.name);
  });
}

async function saveNow(options = {}){
  SAVE_OK = await Store.save(DB);
  LAST_SAVE_AT = new Date().toISOString();
  if(options.toast){
    toast(SAVE_OK ? "保存しました " + timeLabel(LAST_SAVE_AT) : "保存に失敗しました");
  }
  renderSaveOnly();
  return SAVE_OK;
}

const queueSaveInner = debounce(function(){ saveNow(); }, 360);

function noteTouch(){
  if(VIEW && VIEW.name === "case" && VIEW.caseId){ markCaseTouched(VIEW.caseId); }
}

function queueSave(){ noteTouch(); queueSaveInner(); }

function persist(options = {}){
  if(options.touch !== false){ noteTouch(); }
  if(options.render !== false){ render(); }
  if(options.immediate){ saveNow({ toast:options.toast }); }
  else { queueSaveInner(); }
}

function renderSaveOnly(){
  const nodes = document.querySelectorAll("[data-save-meta]");
  nodes.forEach((node) => { node.textContent = renderSaveMeta(); });
  refreshCounts();
}

function go(name, caseId = null, extra = {}){
  const nextId = caseId ?? VIEW.caseId;
  if(name !== "case" || nextId !== VIEW.caseId){ VIEW.caseEdit = false; }
  VIEW = Object.assign({}, VIEW, extra, { name, caseId:nextId });
  window.scrollTo(0, 0);
  render();
}

function toggleCaseEdit(){
  VIEW.caseEdit = !VIEW.caseEdit;
  render();
}

function setFilter(filter){
  VIEW.filter = filter;
  render();
}

function setTab(tab){
  VIEW.tab = tab;
  render();
}

function showModal(html){
  document.getElementById("modalMount").innerHTML =
    `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}

function closeModal(){
  document.getElementById("modalMount").innerHTML = "";
}

function confirmAction(title, body, confirmJs, confirmLabel = "実行"){
  showModal(
    `<h3>${esc(title)}</h3>
    <p class="sub">${esc(body)}</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-danger" onclick="${confirmJs}">${esc(confirmLabel)}</button>
    </div>`
  );
}

const AGE_BANDS = ["10代","20代","30代","40代","50代","60代","70代","80代","90代以上"];

function newCaseModal(){
  showModal(`
    <h3>新規症例</h3>
    <p class="sub">匿名ラベルのみ。氏名・患者ID・病院名は入れない。</p>
    <div class="modal-grid">
      <div>
        <label class="panel-sub">年代</label>
        <select id="ncAge" class="select">
          <option value=""></option>
          ${AGE_BANDS.map((x) => `<option>${x}</option>`).join("")}
        </select>
      </div>
      <div>
        <label class="panel-sub">性別</label>
        <select id="ncSex" class="select">
          <option value=""></option>
          <option value="M">男性</option>
          <option value="F">女性</option>
        </select>
      </div>
    </div>
    <div style="margin-top:10px">
      <label class="panel-sub">主訴・病名</label>
      <input id="ncCc" class="input" placeholder="例: 誤嚥性肺炎" autofocus onkeydown="if(event.key==='Enter'){createCase()}">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="createCase()">作成</button>
    </div>
  `);
  setTimeout(() => document.getElementById("ncCc")?.focus(), 50);
}

function createCase(){
  const ageBand = document.getElementById("ncAge").value;
  const sex = document.getElementById("ncSex").value;
  const cc = document.getElementById("ncCc").value.trim();
  const today = todayISO();
  const caseObj = LOGIC.ensureCaseShape({
    id:LOGIC.makeId(),
    createdAt:Date.now(),
    ageBand, sex, cc,
    admittedAt:today,
    days:[LOGIC.makeEmptyDay(today)]
  });
  DB.cases.unshift(caseObj);
  closeModal();
  VIEW = { name:"case", caseId:caseObj.id, tab:"today", filter:VIEW.filter };
  persist();
}

function updateCaseText(caseId, path, value){
  const caseObj = findCase(caseId);
  const parts = path.split(".");
  let target = caseObj;
  for(let i=0;i<parts.length-1;i+=1){ target = target[parts[i]]; }
  target[parts[parts.length-1]] = value;
  queueSave();
}

function updatePatientSummary(caseId, value){
  updateCaseText(caseId, "patientSummary", value);
}

function updateCaseLabel(caseId, field, value){
  const caseObj = findCase(caseId);
  caseObj[field] = value;
  if(field === "cc"){
    const title = document.querySelector(".case-head .title");
    if(title){ title.textContent = LOGIC.formatLabel(caseObj) || "未設定"; }
    queueSave();
  } else {
    persist();
  }
}

function updateCaseDate(caseId, field, value){
  if(!value){ return; }
  const caseObj = findCase(caseId);
  caseObj[field] = value;
  persist();
}

function setCaseSeverity(caseId, severity){
  const caseObj = findCase(caseId);
  caseObj.severity = severity;
  persist();
}

function manualSave(){
  saveNow({ toast:true });
}

function addProblem(caseId){
  const caseObj = findCase(caseId);
  caseObj.problems.push({ id:LOGIC.makeId(), title:"", assessment:"", active:true });
  persist();
}

function updateProblem(caseId, problemId, field, value){
  const caseObj = findCase(caseId);
  const item = caseObj.problems.find((p) => p.id === problemId);
  item[field] = value;
  if(field === "active"){ persist(); } else { queueSave(); }
}

function deleteProblem(caseId, problemId){
  confirmAction("問題を削除", "この問題を削除します。項目単位のゴミ箱はありません。", `doDeleteProblem('${caseId}','${problemId}')`, "削除");
}

function doDeleteProblem(caseId, problemId){
  const caseObj = findCase(caseId);
  caseObj.problems = caseObj.problems.filter((p) => p.id !== problemId);
  closeModal();
  persist();
}

// Order モード: To Do 追加行のチップ。ON で追加した項目は「出した検査」となり、
// done にした瞬間に Waiting へ「結果確認: …」が1回だけ自動生成される。
// チップは classList 直接切替（再描画すると入力中テキストが消えるため）
let ORDER_MODE = false;

function toggleOrderMode(button){
  ORDER_MODE = !ORDER_MODE;
  button.classList.toggle("on", ORDER_MODE);
}

function addTextItem(caseId, kind, date = todayISO()){
  const inputId = `${kind}Input-${date}`;
  const input = document.getElementById(inputId);
  const text = input.value.trim();
  if(!text){ return; }
  const caseObj = findCase(caseId);
  const day = LOGIC.getDay(caseObj, date) || LOGIC.ensureTodayDay(caseObj, date);
  if(kind === "todo"){
    const item = { id:LOGIC.makeId(), text, done:false };
    if(ORDER_MODE){ item.src = "order"; item.promoted = false; }
    day.todos.push(item);
    ORDER_MODE = false;
  }
  if(kind === "wait"){ day.waits.push({ id:LOGIC.makeId(), text, resolved:false }); }
  if(kind === "hook"){ day.hooks.push({ id:LOGIC.makeId(), text }); }
  input.value = "";
  persist();
  const next = document.getElementById(inputId);
  if(next){ next.focus(); }
}

function updateTextItem(caseId, date, kind, itemId, field, value){
  const caseObj = findCase(caseId);
  const day = LOGIC.getDay(caseObj, date);
  const list = kind === "todo" ? day.todos : kind === "wait" ? day.waits : day.hooks;
  const item = list.find((x) => x.id === itemId);
  item[field] = value;
  // Order 付き To Do を done → Waiting に結果確認を1回だけ自動生成（un-done でも取り消さない）
  if(kind === "todo" && field === "done" && value === true && item.src === "order" && !item.promoted){
    item.promoted = true;
    day.waits.push({ id:LOGIC.makeId(), text:LOGIC.orderWaitText(item.text), resolved:false, src:"order" });
    toast("Waiting に「" + LOGIC.orderWaitText(item.text) + "」を追加しました");
  }
  if(field === "done" || field === "resolved"){ persist(); } else { queueSave(); }
}

  if(!caseObj.lastExportedAt){ return true; }
  if(!caseObj.dischargedAt){ return false; }

}

async function resolvePhotoUrls(caseObj){
  const next = {};
  for(const id of caseObj.admission.photoIds){
    if(PHOTO_URLS[id]){ next[id] = PHOTO_URLS[id]; continue; }
    const record = await Photos.get(id);
    if(record){
      next[id] = URL.createObjectURL(record.blob);
    }
  }
  Object.keys(PHOTO_URLS).forEach((id) => {
    if(!next[id]){ URL.revokeObjectURL(PHOTO_URLS[id]); }
  });
  PHOTO_URLS = next;
}

  if(!record){ return; }
  const file = new File([record.blob], `${photoId}.jpg`, { type:record.blob.type || "image/jpeg" });
  if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
    await navigator.share({ files:[file], title:"Casebook photo" });
    toast("共有シートを開きました");
    return;
  }
  const url = URL.createObjectURL(record.blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${photoId}.jpg`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("画像をダウンロードしました");
}

let PENDING_RESTORE = null;

function handleRestoreInput(input){
  const file = (input.files || [])[0];
  input.value = "";
  if(!file){ return; }
  const reader = new FileReader();
  reader.onload = () => {
    const parsed = LOGIC.parseBackup(String(reader.result || ""));
    if(!parsed.ok){ toast("復元できません: " + parsed.error); return; }
    PENDING_RESTORE = parsed;
    const n = parsed.data.cases.filter((c) => !c.deletedAt).length;
    const stamp = parsed.exportedAt ? parsed.exportedAt.slice(0,16).replace("T"," ") + " 時点・" : "";
    confirmAction("バックアップから復元", stamp + "症例 " + n + " 件に置き換えます。現在のデータは上書きされます（写真は対象外）。", "doRestoreBackup()", "復元");
  };
  reader.readAsText(file);
}

async function doRestoreBackup(){
  const parsed = PENDING_RESTORE;
  PENDING_RESTORE = null;
  closeModal();
  if(!parsed){ return; }
  try { await Backups.snapshotToday(true); } catch(e) {}  // 誤復元の保険: 直前の状態を当日スナップショットへ退避
  DB = parsed.data;
  if(parsed.stats){
    STATS = { days:parsed.stats.days, totals:Object.assign({ recordDays:0 }, parsed.stats.totals) };
    saveStats();
  }
  if(parsed.settings && Array.isArray(parsed.settings.rxWeekdays)){
    SETTINGS.rxWeekdays = parsed.settings.rxWeekdays.filter((n) => Number.isInteger(n) && n >= 0 && n <= 6);
    saveSettings();
  }
  VIEW = { name:"list", caseId:null, tab:"today", filter:"active" };
  await saveNow();
  if(["auto","light","dark"].includes(parsed.theme)){ setTheme(parsed.theme); }
  else { render(); }
  toast("復元しました");
}

const SEVERITY_ORDER = { unstable:0, watcher:1, stable:2, "":3 };

function sortCasesForList(list){
  return list.slice().sort((a, b) => {
    const s = (SEVERITY_ORDER[a.severity] ?? 3) - (SEVERITY_ORDER[b.severity] ?? 3);
    if(s !== 0){ return s; }
    return caseStats(b).todoOpen - caseStats(a).todoOpen;
  });
}

  const stats = caseStats(caseObj);
  const sev = caseObj.severity;
  const noOpen = !stats.todoOpen && !stats.waitOpen;
  return `
    <article class="case-row sev-${sev || "none"}" onclick="go('case','${caseObj.id}')">
      <div class="case-row-top">
        <div class="case-label">${caseObj.status === "active" && !touchedToday(caseObj.id) ? `<span class="dot-untouched" title="今日未更新"></span>` : ""}${esc(LOGIC.formatLabel(caseObj) || "未設定")}</div>

      </div>
      ${caseObj.patientSummary ? `<div class="case-sum">${esc(caseObj.patientSummary)}</div>` : ""}
      <div class="case-flags">
        ${sev ? `<span class="flag severity-${sev}">${esc(LOGIC.severityLabel(sev))}</span>` : ""}
        ${caseObj.status !== "active" ? `<span class="flag">退院</span>` : ""}
        ${caseObj.status === "active" && caseObj.plannedDischargeAt ? `<span class="flag">退院予定 ${esc(caseObj.plannedDischargeAt.slice(5).replace("-","/"))}</span>` : ""}
        ${dischargeExportPending(caseObj) ? `<span class="flag wait">書き出し未</span>` : ""}
        ${caseObj.status === "active" && stats.todoOpen ? `<span class="flag todo">To Do ${stats.todoOpen}</span>` : ""}
        ${caseObj.status === "active" && stats.waitOpen ? `<span class="flag wait">Waiting ${stats.waitOpen}</span>` : ""}
        ${caseObj.status !== "active" && (stats.todoOpen + stats.waitOpen) ? `<span class="flag wait">残 ${stats.todoOpen + stats.waitOpen}</span>` : ""}
        ${noOpen && caseObj.status === "active" ? `<span class="flag clear">未処理なし</span>` : ""}
      </div>
    </article>
  `;
}

// 退院済み症例の Today タブ最上部: 最終記録日の未完了 To Do / 未解消 Waiting をチェックで消し込む
function renderPendingAfterDischarge(caseObj, day){
  const pendingTodos = day.todos.filter((t) => !t.done);
  const pendingWaits = day.waits.filter((w) => !w.resolved);
  if(!pendingTodos.length && !pendingWaits.length){
    return `<section class="panel"><div class="panel-head"><h2>Pending after discharge</h2><div class="panel-sub">退院後未完了・なし</div></div></section>`;
  }
  const row = (kind, item, doneField) => `
    <div class="row-item">
      <button class="row-check ${kind === "wait" ? "" : ""}" onclick="updateTextItem('${caseObj.id}','${day.date}','${kind}','${item.id}','${doneField}',true)" aria-label="完了にする"><span></span></button>
      <div class="row-input" style="cursor:default">${esc(item.text)}${kind === "wait" ? ` <span class="panel-sub">(Waiting)</span>` : ""}</div>
    </div>`;
  return `
    <section class="panel">
      <div class="panel-head"><h2>Pending after discharge</h2><div class="panel-sub">退院後未完了（最終記録 ${esc(day.date)}）・チェックで消し込み</div></div>
      <div class="panel-body list">
        ${pendingTodos.map((t) => row("todo", t, "done")).join("")}
        ${pendingWaits.map((w) => row("wait", w, "resolved")).join("")}
      </div>
    </section>`;
}

function renderContingencyList(caseObj){

        <div class="row-item">
          <span class="row-dot"></span>
          <div class="row-input" style="cursor:default">${esc(item.text)}</div>
          <button class="row-del" onclick="removeContingency('${caseObj.id}','${item.id}')" aria-label="削除">×</button>
        </div>
      `).join("") : `<div class="empty">まだありません。</div>`}
    </div>
    <div class="add-row" style="margin-top:8px">
      <input id="contingencyInput" class="input" placeholder="夜間38.5℃以上→血培2セット" enterkeyhint="next" onkeydown="if(event.key==='Enter'){addContingency('${caseObj.id}')}">
      <button class="btn btn-ghost" onclick="addContingency('${caseObj.id}')">追加</button>
    </div>
  `;
}

function renderTodoLike(caseObj, day, kind){
  const config = {
    todo:{ key:"todos", input:"今日やるを追加", done:"done" },
    wait:{ key:"waits", input:"待ちを追加", done:"resolved" },
    hook:{ key:"hooks", input:"引っかかりを追加", done:null }
  }[kind];
  const items = day[config.key];
  const showOrderChip = kind === "todo" && day.date === todayISO() && caseObj.status === "active";
  const srcTag = (item) => item.src === "order" ? `<span class="flag todo" style="flex-shrink:0">Ord</span>` : item.src === "rx" ? `<span class="flag" style="flex-shrink:0">定期</span>` : "";
  return `
    <div class="list">
      ${items.length ? items.map((item) => `
        <div class="row-item">
          ${config.done
            ? `<button class="row-check ${item[config.done] ? (kind === "wait" ? "wait" : "done") : ""}" onclick="updateTextItem('${caseObj.id}','${day.date}','${kind}','${item.id}','${config.done}',${item[config.done] ? "false" : "true"})" aria-label="完了切替"><span>${item[config.done] ? "✓" : ""}</span></button>`
            : `<span class="row-dot"></span>`}
          <input class="row-input ${config.done && item[config.done] ? "muted" : ""}" value="${esc(item.text)}" oninput="updateTextItem('${caseObj.id}','${day.date}','${kind}','${item.id}','text',this.value)">
          ${config.done ? srcTag(item) : ""}
          <button class="row-del" onclick="deleteTextItem('${caseObj.id}','${day.date}','${kind}','${item.id}')" aria-label="削除">×</button>
        </div>
      `).join("") : `<div class="empty">まだありません。</div>`}
    </div>
    <div class="add-row" style="margin-top:8px">
      <input id="${kind}Input-${day.date}" class="input" placeholder="${config.input}" enterkeyhint="next" onkeydown="if(event.key==='Enter'){addTextItem('${caseObj.id}','${kind}','${day.date}')}">
      ${showOrderChip ? `<button class="chip ${ORDER_MODE ? "on" : ""}" onclick="toggleOrderMode(this)" title="出した検査として追加。done で Waiting に結果確認を自動追加">Order</button>` : ""}
      <button class="btn btn-ghost" onclick="addTextItem('${caseObj.id}','${kind}','${day.date}')">追加</button>
    </div>
  `;
}

function renderPhotoGrid(caseObj){
  if(!caseObj.admission.photoIds.length){ return `<div class="empty" style="grid-column:1/-1">写真はまだありません。</div>`; }
  return caseObj.admission.photoIds.map((id) => `

          <button class="compact-btn" onclick="editEventModal('${eventObj.id}')">編集</button>
          <button class="compact-btn" onclick="deleteEvent('${eventObj.id}')">削除</button>

      </div>
    </div>
  `).join("");
}

// 経過表の日付列: 入院日 〜 max(今日, イベント日, 薬剤開始/終了日, 退院日)。
// days レコードに依存しないため、未来のイベント・処方も列に出る（安全上限370列）
function timelineDates(caseObj){
  const today = todayISO();
  const start = caseObj.admittedAt || today;
  let end = today < start ? start : today;
  const push = (d) => { if(d && /^\d{4}-\d{2}-\d{2}$/.test(d) && d > end){ end = d; } };
  caseObj.events.forEach((e) => push(e.date));
  caseObj.meds.forEach((m) => { push(m.startDate); push(m.endDate); });
  push(caseObj.dischargedAt);
  const dates = [];
  let cur = start;
  let guard = 0;
  while(cur <= end && guard < 370){ dates.push(cur); cur = nextDateISO(cur); guard += 1; }
  return dates.length ? dates : [start];
}

function renderTimelineTab(caseObj){
  const today = todayISO();
  const dates = timelineDates(caseObj);
  const dayCls = (date) => date === today ? "today" : date > today ? "future" : "";
  return `
    <section class="panel" style="margin-top:14px">
      <div class="panel-head"><h2>Timeline</h2><div class="panel-sub">経過表・入院日から最終予定まで（未来の予定は薄く表示）</div></div>
      <div class="panel-body">
        <div class="timeline-wrap">
          <table class="timeline">
            <thead>
              <tr>
                <th>項目</th>
                ${dates.map((date) => `<th class="${dayCls(date)}"><div class="mono">${esc(date.slice(5).replace("-","/"))}</div></th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${caseObj.meds.map((med) => `
                <tr>
                  <td>${esc(med.name)}<div class="panel-sub">${esc(LOGIC.MED_ROUTE_LABELS[med.route])}</div></td>
                  ${dates.map((date) => {
                    const on = med.startDate && med.startDate <= date && (!med.endDate || med.endDate >= date);
                    const cls = [
                      dayCls(date),
                      on ? (med.route === "oral" ? "band-oral" : "band-inj") : ""
                    ].filter(Boolean).join(" ");
                    const tag = !on ? ""
                      : med.startDate === date && med.endDate === date ? `<span class="band-tag">開始/終了</span>`
                      : med.startDate === date ? `<span class="band-tag">開始</span>`
                      : med.endDate === date ? `<span class="band-tag">終了</span>`
                      : "";
                    return `<td class="${cls}">${tag}</td>`;
                  }).join("")}
                </tr>
              `).join("")}
              <tr>
                <td>Events</td>
                ${dates.map((date) => {
                  const list = caseObj.events.filter((eventObj) => eventObj.date === date);
                  return `<td class="${dayCls(date)}"><div class="cell-stack">${list.map((eventObj) => `<button class="event-dot" title="${esc(LOGIC.EVENT_TYPE_LABELS[eventObj.type] + " " + eventObj.title)}" onclick="showEventInfo('${eventObj.id}')">${esc(LOGIC.EVENT_TYPE_LABELS[eventObj.type].slice(0,1))}</button>`).join("")}</div></td>`;
                }).join("")}
              </tr>
            </tbody>
          </table>
        </div>
        <div class="tl-legend">
          <span class="legend-chip oral">帯 = 内服</span>
          <span class="legend-chip inj">帯 = 注射</span>
          <span class="legend-chip ev">●(頭文字) = イベント・タップで詳細</span>
        </div>
      </div>
    </section>
  `;
}

async function hydrateCaseAsync(){
  const caseObj = currentCase();
  if(!caseObj){ return; }
  await resolvePhotoUrls(caseObj);
  const grid = document.getElementById("photoGrid");
  if(grid){ grid.innerHTML = renderPhotoGrid(caseObj); }
}

function toggleSection(button, id){
  const el = document.getElementById(id);
  if(!el){ return; }
  el.classList.toggle("hide");
  button.textContent = el.classList.contains("hide") ? "開く" : "閉じる";
}

async function boot(){
  DB = await Store.load();
  const purged = LOGIC.purgeTrash(DB, todayISO());
  DB = purged.data;
  for(const caseObj of DB.cases){
    LOGIC.applyPlannedDischarge(caseObj, todayISO());
    if(caseObj.status === "active" && !caseObj.deletedAt){
      Object.assign(caseObj, LOGIC.rolloverCase(caseObj, todayISO()));
    }
  }
  applyRxInjection();
  SAVE_OK = await Store.save(DB);
  LAST_SAVE_AT = new Date().toISOString();
  render();
  Backups.snapshotToday(false).catch(() => {});  // 待たない（IndexedDB 不調でも起動を止めない）
  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "visible"){
      let changed = false;
      DB.cases.forEach((caseObj) => {
        if(LOGIC.applyPlannedDischarge(caseObj, todayISO())){ changed = true; }
        if(caseObj.status === "active" && !caseObj.deletedAt){
          const before = JSON.stringify(caseObj.days);
          Object.assign(caseObj, LOGIC.rolloverCase(caseObj, todayISO()));
          if(JSON.stringify(caseObj.days) !== before){ changed = true; }
        }
      });
      if(applyRxInjection()){ changed = true; }
      if(changed){ persist({ touch:false }); }
    }
  });
}

boot();
