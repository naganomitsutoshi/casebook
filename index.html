<!DOCTYPE html>
<!-- Casebook v2 Phase 1: today-first inpatient tracker with local-only storage -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casebook v2</title>
<style>
  :root{
    --paper:#f4f6f4;
    --surface:#fffefa;
    --surface-2:#f8f7f2;
    --ink:#16231d;
    --ink-soft:#516159;
    --ink-faint:#85948b;
    --line:#d8ded8;
    --line-soft:#e9eee9;
    --accent:#1f6f5f;
    --accent-deep:#164f44;
    --accent-soft:#e4f1ed;
    --warn:#ba7a1a;
    --warn-soft:#f7ecd9;
    --danger:#b54444;
    --danger-soft:#fdecec;
    --done:#507c53;
    --done-soft:#e7f0e7;
    --shadow:0 1px 2px rgba(22,35,29,.05),0 10px 30px rgba(22,35,29,.07);
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Inter","Noto Sans JP",system-ui,sans-serif;
    background:
      radial-gradient(circle at top right, rgba(31,111,95,.08), transparent 28%),
      linear-gradient(180deg, #f8faf8 0%, var(--paper) 55%, #eef2ee 100%);
    color:var(--ink);
    line-height:1.55;
    min-height:100vh;
    padding-bottom:72px;
  }
  button,input,textarea,select{font:inherit}
  button{border:none;background:none;cursor:pointer;color:inherit}
  textarea{resize:vertical}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  .hide{display:none!important}

  .topbar{
    position:sticky;top:0;z-index:50;
    backdrop-filter:blur(14px);
    background:rgba(248,250,248,.86);
    border-bottom:1px solid rgba(216,222,216,.85);
  }
  .topbar-in{
    max-width:1100px;margin:0 auto;padding:14px 18px;
    display:flex;align-items:center;gap:12px;
  }
  .brand{display:flex;flex-direction:column;cursor:pointer}
  .brand strong{font-size:18px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
  .brand strong::before{
    content:"";width:10px;height:10px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#6ea48d);
    box-shadow:0 0 0 5px rgba(31,111,95,.12);
  }
  .brand span{font-size:11px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase}
  .spacer{flex:1}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .pill-btn,.tab-btn,.chip,.icon-btn,.btn{
    min-height:44px;border-radius:12px;transition:.15s ease;
  }
  .pill-btn,.tab-btn,.chip,.icon-btn{
    border:1px solid var(--line);background:rgba(255,255,255,.86);
    padding:0 14px;display:inline-flex;align-items:center;gap:8px;
  }
  .pill-btn:hover,.tab-btn:hover,.chip:hover,.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:0 16px;font-weight:700;
  }
  .btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow)}
  .btn-primary:hover{background:var(--accent-deep)}
  .btn-ghost{background:rgba(255,255,255,.84);border:1px solid var(--line)}
  .btn-warn{background:var(--warn-soft);color:var(--warn);border:1px solid #edcf9a}
  .btn-danger{background:var(--danger-soft);color:var(--danger);border:1px solid #efc5c5}
  .btn-block{width:100%}
  .btn-sm,.chip,.tab-btn,.pill-btn,.icon-btn{font-size:13px;font-weight:600}
  .count-badge{
    min-width:22px;height:22px;padding:0 7px;border-radius:999px;
    background:var(--accent-soft);color:var(--accent);display:inline-flex;
    align-items:center;justify-content:center;font-size:12px;font-weight:700;
  }

  main{max-width:1100px;margin:0 auto;padding:22px 18px}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);font-weight:800;margin-bottom:8px}
  h1.page{font-size:30px;line-height:1.1;letter-spacing:-.03em;margin-bottom:6px}
  .sub{color:var(--ink-soft);font-size:14px;max-width:780px}

  .hero{
    background:linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,250,240,.88));
    border:1px solid rgba(216,222,216,.92);box-shadow:var(--shadow);
    border-radius:28px;padding:22px 22px 18px;margin-bottom:20px;
  }
  .hero-top{display:flex;align-items:flex-start;gap:16px;justify-content:space-between;flex-wrap:wrap}
  .privacy{
    margin-top:16px;background:linear-gradient(135deg,var(--warn-soft),#fff7ea);
    border:1px solid #f0d7ad;border-radius:14px;padding:12px 14px;
    color:#8a5c16;font-size:13px;font-weight:600;
  }
  .save-line{margin-top:12px;font-size:12px;color:var(--ink-faint)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:20px 0}

  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
  .metric{
    background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:18px;
    padding:16px;box-shadow:var(--shadow)
  }
  .metric .k{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.12em}
  .metric .v{margin-top:8px;font-size:30px;line-height:1;font-weight:800;letter-spacing:-.04em}
  .metric .s{margin-top:5px;font-size:13px;color:var(--ink-soft)}

  .case-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
  .case-card{
    background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);padding:18px;cursor:pointer;transition:.16s ease;
  }
  .case-card:hover{transform:translateY(-1px);border-color:var(--accent)}
  .case-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .case-label{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .case-cc{margin-top:4px;color:var(--ink-soft);font-size:14px}
  .case-day{font-size:12px;color:var(--ink-faint)}
  .case-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
  .badge{
    border-radius:999px;padding:7px 11px;font-size:12px;font-weight:700;
    display:inline-flex;align-items:center;gap:6px;
  }
  .badge.active{background:var(--accent-soft);color:var(--accent)}
  .badge.todo{background:#eef6ff;color:#3d648d}
  .badge.wait{background:#fff4e6;color:#8b5d1c}
  .badge.done{background:var(--done-soft);color:var(--done)}
  .badge.trash{background:var(--danger-soft);color:var(--danger)}
  .empty{
    padding:48px 18px;border:1px dashed var(--line);border-radius:20px;
    text-align:center;color:var(--ink-faint);background:rgba(255,255,255,.7)
  }

  .backline{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .backlink{font-size:13px;font-weight:700;color:var(--ink-soft)}
  .shell{
    display:grid;grid-template-columns:minmax(0,1.25fr) minmax(300px,.75fr);gap:18px;
    align-items:start;
  }
  .stack{display:flex;flex-direction:column;gap:16px}
  .panel{
    background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;
    box-shadow:var(--shadow);overflow:hidden;
  }
  .panel-head{
    padding:16px 18px;border-bottom:1px solid var(--line-soft);
    display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap
  }
  .panel-head h2{font-size:16px;letter-spacing:-.02em}
  .panel-sub{font-size:12px;color:var(--ink-faint)}
  .panel-body{padding:16px 18px}

  .case-head{
    background:
      linear-gradient(135deg, rgba(31,111,95,.10), rgba(255,255,255,.94) 40%),
      linear-gradient(180deg, #fffef8, #ffffff);
  }
  .case-head .title-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .case-head .title{font-size:28px;line-height:1.05;font-weight:800;letter-spacing:-.04em}
  .case-head .meta{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;color:var(--ink-soft);font-size:13px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap}
  .tab-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .collect-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:12px}
  .collect-btn{
    min-height:84px;border-radius:18px;border:1px solid var(--line);
    background:var(--surface-2);padding:10px;display:flex;flex-direction:column;align-items:flex-start;
    justify-content:space-between;text-align:left
  }
  .collect-btn.on-ok{background:var(--done-soft);border-color:#bed7c1}
  .collect-btn.on-warn{background:var(--warn-soft);border-color:#ebcf96}
  .collect-btn strong{font-size:16px}
  .collect-mark{font-size:28px;font-weight:800;line-height:1}
  .collect-note textarea,.input,.textarea,.select{
    width:100%;border:1px solid var(--line);border-radius:14px;background:#fcfdfa;
    padding:12px 13px;color:var(--ink)
  }
  .input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .list{display:flex;flex-direction:column;gap:10px}
  .row-item{
    border:1px solid var(--line);border-radius:16px;background:var(--surface-2);padding:12px
  }
  .row-main{display:flex;gap:10px;align-items:flex-start}
  .row-check{
    width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:13px;font-weight:800
  }
  .row-check.done{background:var(--done);color:#fff;border-color:var(--done)}
  .row-check.wait{background:#d88814;color:#fff;border-color:#d88814}
  .row-content{flex:1;min-width:0}
  .row-text{font-size:15px;font-weight:600}
  .row-text.muted{text-decoration:line-through;color:var(--ink-faint)}
  .row-meta{margin-top:6px;font-size:12px;color:var(--ink-faint)}
  .inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .compact-btn{
    min-height:36px;padding:0 10px;border-radius:10px;border:1px solid var(--line);
    background:#fff;font-size:12px;font-weight:700
  }
  .compact-btn:hover{border-color:var(--accent);color:var(--accent)}

  .prob-card{border:1px solid var(--line);border-radius:18px;background:var(--surface-2);overflow:hidden}
  .prob-top{display:flex;gap:10px;align-items:center;padding:12px}
  .prob-order{font-size:12px;font-weight:800;color:var(--accent);width:26px;flex-shrink:0}
  .prob-title{flex:1;min-width:0}
  .prob-title .input{font-weight:700;background:#fff}
  .prob-status{font-size:12px;font-weight:700;border-radius:999px;padding:6px 10px;background:var(--done-soft);color:var(--done)}
  .prob-status.off{background:#ebeef0;color:#69787f}
  .prob-body{padding:0 12px 12px}

  .collapse{
    border:1px solid var(--line);border-radius:18px;background:var(--surface-2)
  }
  .collapse-head{
    padding:14px 15px;display:flex;justify-content:space-between;gap:12px;align-items:center
  }
  .collapse-body{padding:0 15px 15px}

  .routine-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .routine-btn{
    min-height:52px;padding:10px 12px;border-radius:14px;border:1px solid var(--line);
    background:#fff;text-align:left;display:flex;gap:10px
  }
  .routine-btn.on{background:var(--accent-soft);border-color:#b6d7ce}
  .routine-box{
    width:18px;height:18px;border-radius:5px;border:2px solid currentColor;display:flex;
    align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:11px
  }
  .routine-copy strong{display:block;font-size:13px}
  .routine-copy span{display:block;font-size:11px;color:var(--ink-faint);margin-top:1px}

  .photo-note{
    margin-top:12px;padding:11px 12px;border-radius:14px;background:var(--warn-soft);
    border:1px solid #efcf98;color:#8a5a12;font-size:12px;font-weight:700
  }
  .photo-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
  .photo-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}
  .photo-card img{display:block;width:100%;aspect-ratio:4/3;object-fit:cover;background:#edf2ef}
  .photo-actions{padding:10px;display:flex;gap:8px;flex-wrap:wrap}

  .event-list,.med-list{display:flex;flex-direction:column;gap:10px}
  .event-item,.med-item{
    padding:12px;border:1px solid var(--line);border-radius:16px;background:var(--surface-2)
  }
  .line-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .line-title{font-weight:700}
  .line-sub{font-size:12px;color:var(--ink-soft);margin-top:4px}

  .log-group{display:flex;flex-direction:column;gap:12px}
  .log-card{
    border:1px solid var(--line);border-radius:18px;background:var(--surface-2);padding:14px
  }
  .log-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}
  .mini-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
  .mini-cell{
    min-height:48px;padding:8px;border-radius:12px;background:#fff;border:1px solid var(--line);
    display:flex;flex-direction:column;justify-content:space-between
  }

  .timeline-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px}
  .timeline{
    min-width:720px;border-collapse:separate;border-spacing:0;width:100%;background:#fff
  }
  .timeline th,.timeline td{
    border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
    padding:8px;min-width:34px;vertical-align:top
  }
  .timeline th:first-child,.timeline td:first-child{
    position:sticky;left:0;background:#fcfdfa;z-index:2;min-width:140px
  }
  .timeline th.today,.timeline td.today{background:#f1faf5}
  .cell-stack{display:flex;flex-direction:column;gap:4px}
  .mark{font-weight:800;font-size:16px;text-align:center}
  .med-band{
    display:block;border-radius:999px;padding:4px 6px;font-size:11px;font-weight:700;text-align:center
  }
  .med-band.oral{background:#e7f2ff;color:#335d8e}
  .med-band.inj{background:#fff0df;color:#985d18}
  .event-dot{
    width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;margin:0 auto
  }

  .modal-bg{
    position:fixed;inset:0;background:rgba(22,35,29,.5);backdrop-filter:blur(4px);
    z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0
  }
  @media(min-width:620px){.modal-bg{align-items:center;padding:20px}}
  .modal{
    width:100%;max-width:560px;max-height:92vh;overflow:auto;
    border-radius:24px 24px 0 0;background:#fff;padding:22px;box-shadow:0 -10px 40px rgba(0,0,0,.2)
  }
  @media(min-width:620px){.modal{border-radius:24px}}
  .modal h3{font-size:22px;letter-spacing:-.03em}
  .modal p.sub{margin-top:6px;margin-bottom:16px}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}

  .toast{
    position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 16px;border-radius:12px;
    box-shadow:0 10px 32px rgba(0,0,0,.22);opacity:0;transition:.22s;z-index:110;pointer-events:none
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:920px){
    .shell{grid-template-columns:1fr}
    .metrics{grid-template-columns:repeat(2,1fr)}
    .case-grid{grid-template-columns:1fr}
  }
  @media(max-width:520px){
    main{padding:18px 14px}
    .topbar-in{padding:12px 14px}
    h1.page{font-size:24px}
    .collect-grid,.mini-grid,.routine-grid,.modal-grid,.photo-grid{grid-template-columns:1fr}
    .metrics{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-in">
      <div class="brand" onclick="go('list')">
        <strong>Casebook</strong>
        <span>today-first ward notebook</span>
      </div>
      <div class="spacer"></div>
      <div class="header-actions">
        <button class="pill-btn" onclick="copyDailyExport()">
          今日の書き出し
          <span class="count-badge" id="exportableCount">0</span>
        </button>
        <button class="pill-btn" onclick="go('trash')">
          ゴミ箱
          <span class="count-badge" id="trashCount">0</span>
        </button>
      </div>
    </div>
  </div>

  <main id="app"></main>
  <div id="modalMount"></div>
  <div id="toast" class="toast"></div>

<script id="logic">
function logicFactory(){
  const COLLECT_KEYS = ["fever","meal","bowel","sleep","pain"];
  const COLLECT_LABELS = { fever:"熱", meal:"食", bowel:"便", sleep:"眠", pain:"痛" };
  const COLLECT_MARKS = { "":"-","ok":"✓","warn":"⚠" };
  const MED_ROUTE_LABELS = { oral:"内服", inj:"注射" };
  const EVENT_TYPE_LABELS = { test:"検査", surgery:"手術", procedure:"処置", treatment:"治療", other:"その他" };

  function makeId(){
    return Math.random().toString(36).slice(2,10);
  }

  function isoNow(){
    return new Date().toISOString();
  }

  function makeEmptyCollect(){
    return { fever:"", meal:"", bowel:"", sleep:"", pain:"", note:"" };
  }

  function makeEmptyDay(date){
    return { date, collect:makeEmptyCollect(), todos:[], waits:[], hooks:[] };
  }

  function dayNumber(caseObj, today){
    if(!caseObj || !caseObj.admittedAt || !today){ return 1; }
    const start = new Date(caseObj.admittedAt + "T00:00:00");
    const end = new Date(today + "T00:00:00");
    const diff = Math.floor((end - start) / 86400000);
    return Number.isFinite(diff) && diff >= 0 ? diff + 1 : 1;
  }

  function ensureCaseShape(caseObj){
    const base = {
      id:makeId(),
      createdAt:Date.now(),
      status:"active",
      deletedAt:null,
      ageBand:"",
      sex:"",
      cc:"",
      admittedAt:"",
      dischargedAt:null,
      admission:{ note:"", photoIds:[], routine:{} },
      problems:[],
      meds:[],
      events:[],
      days:[],
      summary:{ course:"", outcome:"" },
      lastExportedAt:null
    };
    const out = Object.assign({}, base, caseObj || {});
    out.admission = Object.assign({}, base.admission, out.admission || {});
    out.admission.photoIds = Array.isArray(out.admission.photoIds) ? out.admission.photoIds.slice() : [];
    out.admission.routine = Object.assign({}, out.admission.routine || {});
    out.problems = Array.isArray(out.problems) ? out.problems.map(function(p){
      return { id:p.id || makeId(), title:p.title || "", assessment:p.assessment || "", active:p.active !== false };
    }) : [];
    out.meds = Array.isArray(out.meds) ? out.meds.map(function(m){
      return {
        id:m.id || makeId(),
        name:m.name || "",
        route:m.route === "inj" ? "inj" : "oral",
        startDate:m.startDate || "",
        endDate:m.endDate || null,
        note:m.note || ""
      };
    }) : [];
    out.events = Array.isArray(out.events) ? out.events.map(function(e){
      return {
        id:e.id || makeId(),
        date:e.date || "",
        type:EVENT_TYPE_LABELS[e.type] ? e.type : "other",
        title:e.title || "",
        note:e.note || ""
      };
    }) : [];
    out.days = Array.isArray(out.days) ? out.days.map(function(d){
      const day = Object.assign(makeEmptyDay(d.date || ""), d || {});
      day.collect = Object.assign(makeEmptyCollect(), d && d.collect ? d.collect : {});
      day.todos = Array.isArray(day.todos) ? day.todos.map(function(t){ return { id:t.id || makeId(), text:t.text || "", done:!!t.done }; }) : [];
      day.waits = Array.isArray(day.waits) ? day.waits.map(function(w){ return { id:w.id || makeId(), text:w.text || "", resolved:!!w.resolved }; }) : [];
      day.hooks = Array.isArray(day.hooks) ? day.hooks.map(function(h){ return { id:h.id || makeId(), text:h.text || "" }; }) : [];
      return day;
    }).sort(function(a,b){ return a.date.localeCompare(b.date); }) : [];
    out.summary = Object.assign({}, base.summary, out.summary || {});
    return out;
  }

  function normalizeData(data){
    const safe = data && typeof data === "object" ? data : {};
    return {
      version:2,
      cases:Array.isArray(safe.cases) ? safe.cases.map(ensureCaseShape) : []
    };
  }

  function getDay(caseObj, date){
    if(!caseObj || !Array.isArray(caseObj.days)){ return null; }
    for(var i=0;i<caseObj.days.length;i+=1){
      if(caseObj.days[i].date === date){ return caseObj.days[i]; }
    }
    return null;
  }

  function getLatestDay(caseObj){
    if(!caseObj || !Array.isArray(caseObj.days) || !caseObj.days.length){ return null; }
    return caseObj.days[caseObj.days.length - 1];
  }

  function ensureTodayDay(caseObj, today){
    var existing = getDay(caseObj, today);
    if(existing){ return existing; }
    var day = makeEmptyDay(today);
    caseObj.days.push(day);
    caseObj.days.sort(function(a,b){ return a.date.localeCompare(b.date); });
    return getDay(caseObj, today);
  }

  function rolloverCase(caseObj, today){
    var c = ensureCaseShape(caseObj);
    var existing = getDay(c, today);
    if(existing){ return c; }
    var latest = getLatestDay(c);
    if(!latest || !latest.date || latest.date >= today){
      c.days.push(makeEmptyDay(today));
      c.days.sort(function(a,b){ return a.date.localeCompare(b.date); });
      return c;
    }
    var nextDay = makeEmptyDay(today);
    nextDay.todos = latest.todos.filter(function(t){ return !t.done; }).map(function(t){
      return { id:makeId(), text:t.text, done:false };
    });
    nextDay.waits = latest.waits.filter(function(w){ return !w.resolved; }).map(function(w){
      return { id:makeId(), text:w.text, resolved:false };
    });
    c.days.push(nextDay);
    c.days.sort(function(a,b){ return a.date.localeCompare(b.date); });
    return c;
  }

  function purgeTrash(data, todayIso){
    var model = normalizeData(data);
    var cutoff = new Date(todayIso + "T00:00:00").getTime() - 30 * 86400000;
    var purgedCaseIds = [];
    model.cases = model.cases.filter(function(caseObj){
      if(!caseObj.deletedAt){ return true; }
      var ts = new Date(caseObj.deletedAt).getTime();
      if(Number.isFinite(ts) && ts < cutoff){
        purgedCaseIds.push(caseObj.id);
        return false;
      }
      return true;
    });
    return { data:model, purgedCaseIds:purgedCaseIds };
  }

  function formatLabel(caseObj){
    var sex = caseObj.sex === "M" ? "男性" : caseObj.sex === "F" ? "女性" : "";
    return [caseObj.ageBand, sex, caseObj.cc].filter(Boolean).join("・");
  }

  function collectSummary(collect){
    return COLLECT_KEYS.map(function(key){
      return COLLECT_LABELS[key] + COLLECT_MARKS[collect[key] || ""];
    }).join(" ");
  }

  function latestChangeItems(caseObj, today){
    return {
      meds:caseObj.meds.filter(function(m){ return m.startDate === today || m.endDate === today; }),
      events:caseObj.events.filter(function(e){ return e.date === today; })
    };
  }

  function buildDailyExport(data, today){
    var model = normalizeData(data);
    var lines = ["# Casebook 書き出し " + today];
    model.cases.filter(function(c){ return c.status === "active" && !c.deletedAt; }).forEach(function(caseObj){
      var day = getDay(caseObj, today) || makeEmptyDay(today);
      var changes = latestChangeItems(caseObj, today);
      lines.push("## 症例: " + formatLabel(caseObj) + "（病日" + dayNumber(caseObj, today) + "）");
      lines.push("### 問題リスト");
      var activeProblems = caseObj.problems.filter(function(p){ return p.active !== false && p.title; });
      if(activeProblems.length){
        activeProblems.forEach(function(problem, index){
          var text = "- #" + (index + 1) + " " + problem.title;
          if(problem.assessment){ text += " — A: " + problem.assessment.replace(/\n/g, " "); }
          lines.push(text);
        });
      } else {
        lines.push("- なし");
      }
      lines.push("### 今日の収集");
      lines.push(collectSummary(day.collect) + (day.collect.note ? " ／ メモ: " + day.collect.note.replace(/\n/g, " ") : ""));
      lines.push("### 今日やる");
      if(day.todos.length){ day.todos.forEach(function(todo){ lines.push("- [" + (todo.done ? "x" : " ") + "] " + todo.text); }); }
      else { lines.push("- なし"); }
      lines.push("### 待ち");
      if(day.waits.length){ day.waits.forEach(function(wait){ lines.push("- [" + (wait.resolved ? "x" : " ") + "] " + wait.text); }); }
      else { lines.push("- なし"); }
      lines.push("### 引っかかり");
      if(day.hooks.length){ day.hooks.forEach(function(hook){ lines.push("- " + hook.text); }); }
      else { lines.push("- なし"); }
      lines.push("### 薬剤・イベント（本日変更分）");
      if(!changes.meds.length && !changes.events.length){
        lines.push("- 変更なし");
      } else {
        changes.meds.forEach(function(med){
          var head = med.startDate === today ? "開始" : "終了";
          var end = med.endDate ? "〜" + med.endDate.slice(5).replace("-", "/") : "〜";
          lines.push("- " + head + ": " + med.name + " " + MED_ROUTE_LABELS[med.route] + "（" + med.startDate.slice(5).replace("-", "/") + end + "）");
        });
        changes.events.forEach(function(eventObj){
          lines.push("- イベント: " + eventObj.date.slice(5).replace("-", "/") + " " + EVENT_TYPE_LABELS[eventObj.type] + " " + eventObj.title);
        });
      }
      lines.push("### 写真");
      lines.push("- 入院時写真 " + caseObj.admission.photoIds.length + "枚 → Obsidian へ共有済みのものを /casebook が OCR");
    });
    return lines.join("\n");
  }

  function buildDischargeExport(caseObj){
    var c = ensureCaseShape(caseObj);
    var lines = [
      "---",
      "type: casebook-discharge",
      "date: " + (c.dischargedAt || c.admittedAt || ""),
      "label: " + formatLabel(c),
      "---",
      "",
      "# " + formatLabel(c),
      "",
      "## 入院期間",
      "- 入院日: " + (c.admittedAt || ""),
      "- 退院日: " + (c.dischargedAt || ""),
      "",
      "## 入院時記録",
      c.admission.note || "",
      "",
      "## ルーチン",
    ];
    Object.keys(c.admission.routine).filter(function(key){ return c.admission.routine[key]; }).forEach(function(key){
      lines.push("- " + key);
    });
    if(lines[lines.length - 1] === "## ルーチン"){ lines.push("- なし"); }
    lines.push("");
    lines.push("## 問題リスト");
    if(c.problems.length){
      c.problems.forEach(function(problem, index){
        lines.push("### #" + (index + 1) + " " + (problem.title || "無題"));
        if(problem.assessment){ lines.push(problem.assessment); }
        lines.push("");
      });
    } else {
      lines.push("- なし");
      lines.push("");
    }
    lines.push("## 日々のログ");
    if(c.days.length){
      c.days.forEach(function(day){
        lines.push("### " + day.date);
        lines.push("- 収集: " + collectSummary(day.collect) + (day.collect.note ? " ／ " + day.collect.note.replace(/\n/g, " ") : ""));
        if(day.todos.length){ day.todos.forEach(function(todo){ lines.push("- Todo [" + (todo.done ? "x" : " ") + "] " + todo.text); }); }
        if(day.waits.length){ day.waits.forEach(function(wait){ lines.push("- Wait [" + (wait.resolved ? "x" : " ") + "] " + wait.text); }); }
        if(day.hooks.length){ day.hooks.forEach(function(hook){ lines.push("- Hook " + hook.text); }); }
        lines.push("");
      });
    } else {
      lines.push("- なし");
      lines.push("");
    }
    lines.push("## 薬剤一覧");
    if(c.meds.length){
      c.meds.forEach(function(med){
        lines.push("- " + med.name + " / " + MED_ROUTE_LABELS[med.route] + " / " + med.startDate + "〜" + (med.endDate || "継続中") + (med.note ? " / " + med.note.replace(/\n/g, " ") : ""));
      });
    } else {
      lines.push("- なし");
    }
    lines.push("");
    lines.push("## イベント一覧");
    if(c.events.length){
      c.events.forEach(function(eventObj){
        lines.push("- " + eventObj.date + " / " + EVENT_TYPE_LABELS[eventObj.type] + " / " + eventObj.title + (eventObj.note ? " / " + eventObj.note.replace(/\n/g, " ") : ""));
      });
    } else {
      lines.push("- なし");
    }
    lines.push("");
    lines.push("## 退院時サマリ");
    lines.push("### 経過要約");
    lines.push(c.summary.course || "");
    lines.push("");
    lines.push("### 転帰");
    lines.push(c.summary.outcome || "");
    return lines.join("\n");
  }

  return {
    COLLECT_KEYS:COLLECT_KEYS,
    COLLECT_LABELS:COLLECT_LABELS,
    COLLECT_MARKS:COLLECT_MARKS,
    MED_ROUTE_LABELS:MED_ROUTE_LABELS,
    EVENT_TYPE_LABELS:EVENT_TYPE_LABELS,
    makeId:makeId,
    isoNow:isoNow,
    makeEmptyDay:makeEmptyDay,
    makeEmptyCollect:makeEmptyCollect,
    ensureCaseShape:ensureCaseShape,
    normalizeData:normalizeData,
    getDay:getDay,
    getLatestDay:getLatestDay,
    ensureTodayDay:ensureTodayDay,
    rolloverCase:rolloverCase,
    purgeTrash:purgeTrash,
    formatLabel:formatLabel,
    dayNumber:dayNumber,
    buildDailyExport:buildDailyExport,
    buildDischargeExport:buildDischargeExport
  };
}
var LOGIC = logicFactory();
if(typeof module !== "undefined"){ module.exports = LOGIC; }
</script>

<script>
const KEY = "casebook:v2";
const PHOTO_DB = "casebook-photos";
const PHOTO_STORE = "photos";
const ROUTINE = [
  {k:"vte", t:"VTE予防", h:"リスク評価・予防"},
  {k:"delirium", t:"せん妄", h:"予防・評価"},
  {k:"nutrition", t:"栄養", h:"食事・嚥下"},
  {k:"pain", t:"疼痛", h:"評価と対応"},
  {k:"devices", t:"デバイス", h:"不要物の確認"},
  {k:"meds", t:"常用薬", h:"継続・中止整理"},
  {k:"allergy", t:"アレルギー", h:"薬剤歴"},
  {k:"disposition", t:"退院先", h:"Day1から意識"},
  {k:"rehab", t:"リハ・ADL", h:"活動性"},
  {k:"code", t:"急変時方針", h:"ACP / code"}
];
const COLLECT_CYCLE = ["","ok","warn"];
const todayISO = () => new Date().toISOString().slice(0,10);
const esc = (s) => String(s || "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const timeLabel = (iso) => new Date(iso).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

const Store = {
  mem:null,
  empty(){ return { version:2, cases:[] }; },
  async load(){
    if(window.storage && typeof window.storage.get === "function"){
      try{
        const res = await window.storage.get(KEY);
        const data = res && res.value ? JSON.parse(res.value) : this.empty();
        this.mem = LOGIC.normalizeData(data);
        return this.mem;
      }catch(_e){}
    }
    try{
      const raw = localStorage.getItem(KEY);
      const data = raw ? JSON.parse(raw) : this.empty();
      this.mem = LOGIC.normalizeData(data);
      return this.mem;
    }catch(_e){}
    return this.mem || this.empty();
  },
  async save(data){
    this.mem = LOGIC.normalizeData(data);
    const payload = JSON.stringify(this.mem);
    if(window.storage && typeof window.storage.set === "function"){
      try{
        await window.storage.set(KEY, payload);
        return true;
      }catch(_e){}
    }
    try{
      localStorage.setItem(KEY, payload);
      return true;
    }catch(_e){}
    return false;
  }
};

const Photos = {
  dbp:null,
  async db(){
    if(this.dbp){ return this.dbp; }
    this.dbp = new Promise((resolve, reject) => {
      const req = indexedDB.open(PHOTO_DB, 1);
      req.onupgradeneeded = function(){
        const db = req.result;
        const store = db.createObjectStore(PHOTO_STORE, { keyPath:"id" });
        store.createIndex("caseId", "caseId", { unique:false });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return this.dbp;
  },
  async add(caseId, blob){
    const db = await this.db();
    const record = { id:LOGIC.makeId(), caseId, blob, createdAt:new Date().toISOString() };
    await new Promise((resolve, reject) => {
      const tx = db.transaction(PHOTO_STORE, "readwrite");
      tx.objectStore(PHOTO_STORE).add(record);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
    return record.id;
  },
  async get(id){
    const db = await this.db();
    return new Promise((resolve, reject) => {
      const req = db.transaction(PHOTO_STORE, "readonly").objectStore(PHOTO_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },
  async remove(id){
    const db = await this.db();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(PHOTO_STORE, "readwrite");
      tx.objectStore(PHOTO_STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async removeByCase(caseId){
    const db = await this.db();
    const ids = await new Promise((resolve, reject) => {
      const tx = db.transaction(PHOTO_STORE, "readonly");
      const idx = tx.objectStore(PHOTO_STORE).index("caseId");
      const req = idx.getAll(caseId);
      req.onsuccess = () => resolve((req.result || []).map((x) => x.id));
      req.onerror = () => reject(req.error);
    });
    for(const id of ids){ await this.remove(id); }
  }
};

let DB = Store.empty();
let VIEW = { name:"list", caseId:null, tab:"today", filter:"active" };
let SAVE_OK = true;
let LAST_SAVE_AT = null;
let saveTimer = null;
let toastTimer = null;
let PHOTO_URLS = {};

function findCase(id){
  return DB.cases.find((c) => c.id === id) || null;
}

function activeCases(){
  return DB.cases.filter((c) => !c.deletedAt && c.status === "active");
}

function trashCases(){
  return DB.cases.filter((c) => !!c.deletedAt);
}

function visibleCases(){
  return DB.cases.filter((c) => {
    if(c.deletedAt){ return false; }
    if(VIEW.filter === "all"){ return true; }
    return c.status === VIEW.filter;
  });
}

function currentCase(){
  return findCase(VIEW.caseId);
}

function currentDay(caseObj){
  return LOGIC.ensureTodayDay(caseObj, todayISO());
}

function renderSaveMeta(){
  if(!LAST_SAVE_AT){ return SAVE_OK ? "未保存の変更なし" : "保存先に書き込めません"; }
  return SAVE_OK ? "保存しました " + timeLabel(LAST_SAVE_AT) : "保存に失敗しました";
}

function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

function refreshCounts(){
  const today = todayISO();
  document.getElementById("trashCount").textContent = String(trashCases().length);
  document.getElementById("exportableCount").textContent = String(activeCases().length);
}

async function saveNow(options = {}){
  SAVE_OK = await Store.save(DB);
  LAST_SAVE_AT = new Date().toISOString();
  if(options.toast){
    toast(SAVE_OK ? "保存しました " + timeLabel(LAST_SAVE_AT) : "保存に失敗しました");
  }
  renderSaveOnly();
  return SAVE_OK;
}

function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { saveNow(); }, 360);
}

function persist(options = {}){
  if(options.render !== false){ render(); }
  if(options.immediate){ saveNow({ toast:options.toast }); }
  else { queueSave(); }
}

function renderSaveOnly(){
  const nodes = document.querySelectorAll("[data-save-meta]");
  nodes.forEach((node) => { node.textContent = renderSaveMeta(); });
  refreshCounts();
}

function go(name, caseId = null, extra = {}){
  VIEW = Object.assign({}, VIEW, extra, { name, caseId:caseId ?? VIEW.caseId });
  window.scrollTo(0, 0);
  render();
}

function setFilter(filter){
  VIEW.filter = filter;
  render();
}

function setTab(tab){
  VIEW.tab = tab;
  render();
}

function showModal(html){
  document.getElementById("modalMount").innerHTML =
    `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}

function closeModal(){
  document.getElementById("modalMount").innerHTML = "";
}

function confirmAction(title, body, confirmJs, confirmLabel = "実行"){
  showModal(
    `<h3>${esc(title)}</h3>
    <p class="sub">${esc(body)}</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-danger" onclick="${confirmJs}">${esc(confirmLabel)}</button>
    </div>`
  );
}

function newCaseModal(){
  showModal(`
    <h3>新規症例</h3>
    <p class="sub">匿名ラベルのみ。氏名・患者ID・病院名は入れない。</p>
    <div class="modal-grid">
      <div>
        <label class="panel-sub">年代</label>
        <select id="ncAge" class="select">
          <option value=""></option>
          ${["10代","20代","30代","40代","50代","60代","70代","80代","90代以上"].map((x) => `<option>${x}</option>`).join("")}
        </select>
      </div>
      <div>
        <label class="panel-sub">性別</label>
        <select id="ncSex" class="select">
          <option value=""></option>
          <option value="M">男性</option>
          <option value="F">女性</option>
        </select>
      </div>
    </div>
    <div style="margin-top:10px">
      <label class="panel-sub">一言</label>
      <input id="ncCc" class="input" placeholder="例: 誤嚥性肺炎" autofocus>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="createCase()">作成</button>
    </div>
  `);
  setTimeout(() => document.getElementById("ncCc")?.focus(), 50);
}

function createCase(){
  const ageBand = document.getElementById("ncAge").value;
  const sex = document.getElementById("ncSex").value;
  const cc = document.getElementById("ncCc").value.trim();
  const today = todayISO();
  const caseObj = LOGIC.ensureCaseShape({
    id:LOGIC.makeId(),
    createdAt:Date.now(),
    ageBand, sex, cc,
    admittedAt:today,
    days:[LOGIC.makeEmptyDay(today)]
  });
  DB.cases.unshift(caseObj);
  closeModal();
  VIEW = { name:"case", caseId:caseObj.id, tab:"today", filter:VIEW.filter };
  persist();
}

function toggleCollect(caseId, key, date = todayISO()){
  const caseObj = findCase(caseId);
  const day = LOGIC.getDay(caseObj, date) || LOGIC.ensureTodayDay(caseObj, date);
  const current = day.collect[key] || "";
  const next = COLLECT_CYCLE[(COLLECT_CYCLE.indexOf(current) + 1) % COLLECT_CYCLE.length];
  day.collect[key] = next;
  persist();
}

function updateDayCollectNote(caseId, date, value){
  const caseObj = findCase(caseId);
  const day = LOGIC.getDay(caseObj, date) || LOGIC.ensureTodayDay(caseObj, date);
  day.collect.note = value;
  queueSave();
}

function updateCaseText(caseId, path, value){
  const caseObj = findCase(caseId);
  const parts = path.split(".");
  let target = caseObj;
  for(let i=0;i<parts.length-1;i+=1){ target = target[parts[i]]; }
  target[parts[parts.length-1]] = value;
  queueSave();
}

function manualSave(){
  saveNow({ toast:true });
}

function addProblem(caseId){
  const caseObj = findCase(caseId);
  caseObj.problems.push({ id:LOGIC.makeId(), title:"", assessment:"", active:true });
  persist();
}

function updateProblem(caseId, problemId, field, value){
  const caseObj = findCase(caseId);
  const item = caseObj.problems.find((p) => p.id === problemId);
  item[field] = value;
  if(field === "active"){ persist(); } else { queueSave(); }
}

function deleteProblem(caseId, problemId){
  confirmAction("問題を削除", "この問題を削除します。項目単位のゴミ箱はありません。", `doDeleteProblem('${caseId}','${problemId}')`, "削除");
}

function doDeleteProblem(caseId, problemId){
  const caseObj = findCase(caseId);
  caseObj.problems = caseObj.problems.filter((p) => p.id !== problemId);
  closeModal();
  persist();
}

function addTextItem(caseId, kind, date = todayISO()){
  const input = document.getElementById(`${kind}Input`);
  const text = input.value.trim();
  if(!text){ return; }
  const caseObj = findCase(caseId);
  const day = LOGIC.getDay(caseObj, date) || LOGIC.ensureTodayDay(caseObj, date);
  if(kind === "todo"){ day.todos.push({ id:LOGIC.makeId(), text, done:false }); }
  if(kind === "wait"){ day.waits.push({ id:LOGIC.makeId(), text, resolved:false }); }
  if(kind === "hook"){ day.hooks.push({ id:LOGIC.makeId(), text }); }
  input.value = "";
  persist();
}

function updateTextItem(caseId, date, kind, itemId, field, value){
  const caseObj = findCase(caseId);
  const day = LOGIC.getDay(caseObj, date);
  const list = kind === "todo" ? day.todos : kind === "wait" ? day.waits : day.hooks;
  const item = list.find((x) => x.id === itemId);
  item[field] = value;
  if(field === "done" || field === "resolved"){ persist(); } else { queueSave(); }
}

function deleteTextItem(caseId, date, kind, itemId){
  confirmAction("項目を削除", "この項目を削除します。元に戻せません。", `doDeleteTextItem('${caseId}','${date}','${kind}','${itemId}')`, "削除");
}

function doDeleteTextItem(caseId, date, kind, itemId){
  const caseObj = findCase(caseId);
  const day = LOGIC.getDay(caseObj, date);
  const key = kind === "todo" ? "todos" : kind === "wait" ? "waits" : "hooks";
  day[key] = day[key].filter((x) => x.id !== itemId);
  closeModal();
  persist();
}

function toggleRoutine(caseId, key){
  const caseObj = findCase(caseId);
  caseObj.admission.routine[key] = !caseObj.admission.routine[key];
  persist();
}

function createMed(){
  const caseObj = currentCase();
  const name = document.getElementById("medName").value.trim();
  if(!name){ return; }
  caseObj.meds.unshift({
    id:LOGIC.makeId(),
    name,
    route:document.getElementById("medRoute").value,
    startDate:document.getElementById("medStart").value || todayISO(),
    endDate:document.getElementById("medEnd").value || null,
    note:document.getElementById("medNote").value.trim()
  });
  persist();
}

function deleteMed(medId){
  confirmAction("薬剤を削除", "この薬剤を削除します。", `doDeleteMed('${medId}')`, "削除");
}

function doDeleteMed(medId){
  const caseObj = currentCase();
  caseObj.meds = caseObj.meds.filter((m) => m.id !== medId);
  closeModal();
  persist();
}

function createEvent(){
  const caseObj = currentCase();
  const title = document.getElementById("evTitle").value.trim();
  if(!title){ return; }
  caseObj.events.unshift({
    id:LOGIC.makeId(),
    date:document.getElementById("evDate").value || todayISO(),

async function doPermanentlyDeleteCase(caseId){

  persist();

async function handlePhotoInput(input, caseId){
  const files = Array.from(input.files || []);
  if(!files.length){ return; }
  const caseObj = findCase(caseId);
  for(const file of files){
    const id = await Photos.add(caseId, file);
    caseObj.admission.photoIds.push(id);
  }
  input.value = "";
  persist();
}

async function resolvePhotoUrls(caseObj){
  const next = {};
  for(const id of caseObj.admission.photoIds){
    if(PHOTO_URLS[id]){ next[id] = PHOTO_URLS[id]; continue; }
    const record = await Photos.get(id);
    if(record){
      next[id] = URL.createObjectURL(record.blob);
    }
  }
  Object.keys(PHOTO_URLS).forEach((id) => {
    if(!next[id]){ URL.revokeObjectURL(PHOTO_URLS[id]); }
  });
  PHOTO_URLS = next;
}

async function openPhoto(photoId){
  const record = await Photos.get(photoId);
  if(!record){ return; }
  const url = PHOTO_URLS[photoId] || URL.createObjectURL(record.blob);
  PHOTO_URLS[photoId] = url;
  showModal(`
    <h3>写真</h3>
    <img src="${esc(url)}" alt="" style="width:100%;border-radius:16px;margin-top:14px">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">閉じる</button>
    </div>
  `);
}

async function sharePhoto(photoId){
  const record = await Photos.get(photoId);
  if(!record){ return; }
  const file = new File([record.blob], `${photoId}.jpg`, { type:record.blob.type || "image/jpeg" });
  if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
    await navigator.share({ files:[file], title:"Casebook photo" });
    toast("共有シートを開きました");
    return;
  }
  const url = URL.createObjectURL(record.blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${photoId}.jpg`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("画像をダウンロードしました");
}

function deletePhoto(caseId, photoId){
  confirmAction("写真を削除", "この写真を削除します。", `doDeletePhoto('${caseId}','${photoId}')`, "削除");
}

async function doDeletePhoto(caseId, photoId){
  const caseObj = findCase(caseId);
  caseObj.admission.photoIds = caseObj.admission.photoIds.filter((id) => id !== photoId);

}

function exportText(text, after){
  navigator.clipboard.writeText(text).then(() => {
    if(after){ after(); }
    toast("クリップボードへコピーしました");
  }).catch(() => {
    showModal(`
      <h3>コピーできませんでした</h3>
      <p class="sub">下のテキストを手動でコピーしてください。</p>
      <textarea class="textarea mono" style="height:320px">${esc(text)}</textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">閉じる</button>
      </div>
    `);
  });
}

function copyDailyExport(){

    saveNow();

function copyDischargeExport(caseId){

    saveNow();

function syncTodayView(caseObj){
  const rolled = LOGIC.rolloverCase(caseObj, todayISO());
  Object.assign(caseObj, rolled);

function caseStats(caseObj){
  const day = currentDay(caseObj);
  return {
    dayNumber:LOGIC.dayNumber(caseObj, todayISO()),
    todoOpen:day.todos.filter((x) => !x.done).length,
    waitOpen:day.waits.filter((x) => !x.resolved).length,
    collectDone:LOGIC.COLLECT_KEYS.filter((key) => day.collect[key]).length
  };
}

          <div class="line-title">${esc(eventObj.title)}</div>
          <div class="line-sub">${esc(eventObj.date)} / ${esc(LOGIC.EVENT_TYPE_LABELS[eventObj.type])}</div>
          ${eventObj.note ? `<div class="line-sub">${esc(eventObj.note)}</div>` : ""}
        </div>
        <button class="compact-btn" onclick="deleteEvent('${eventObj.id}')">削除</button>
      </div>
    </div>
  `).join("");
}

function renderLogTab(caseObj){
  const days = caseObj.days.slice().sort((a,b) => b.date.localeCompare(a.date));
  return `
    <section class="panel" style="margin-top:18px">
      <div class="panel-head"><h2>過去ログ</h2><div class="panel-sub">collect / todos / waits / hooks を後から編集できる</div></div>
      <div class="panel-body log-group">
        ${days.length ? days.map((day) => `
          <article class="log-card">
            <div class="log-title">
              <strong class="mono">${esc(day.date)}</strong>
              <span class="panel-sub">病日 ${LOGIC.dayNumber(caseObj, day.date)}</span>
            </div>
            <div class="mini-grid">
              ${LOGIC.COLLECT_KEYS.map((key) => `
                <button class="mini-cell" onclick="toggleCollect('${caseObj.id}','${key}','${day.date}')">
                  <span>${esc(LOGIC.COLLECT_LABELS[key])}</span>
                  <strong>${esc(LOGIC.COLLECT_MARKS[day.collect[key] || ""])}</strong>
                </button>
              `).join("")}
            </div>
            <div style="margin-top:10px">
              <textarea class="textarea" rows="2" placeholder="収集メモ" oninput="updateDayCollectNote('${caseObj.id}','${day.date}',this.value)">${esc(day.collect.note)}</textarea>
            </div>
            <div style="margin-top:14px"><strong>今日やる</strong></div>
            ${renderTodoLike(caseObj, day, "todo")}
            <div style="margin-top:14px"><strong>待ち</strong></div>
            ${renderTodoLike(caseObj, day, "wait")}
            <div style="margin-top:14px"><strong>引っかかり</strong></div>
            ${renderTodoLike(caseObj, day, "hook")}
          </article>
        `).join("") : `<div class="empty">ログがありません。</div>`}
      </div>
    </section>
  `;
}

function renderTimelineTab(caseObj){
  const days = caseObj.days.slice().sort((a,b) => a.date.localeCompare(b.date));
  const dates = days.map((d) => d.date);
  return `
    <section class="panel" style="margin-top:18px">
      <div class="panel-head"><h2>経過表</h2><div class="panel-sub">入院日から今日までの簡易タイムライン</div></div>
      <div class="panel-body">
        <div class="timeline-wrap">
          <table class="timeline">
            <thead>
              <tr>
                <th>項目</th>
                ${dates.map((date) => `<th class="${date === todayISO() ? "today" : ""}"><div class="mono">${esc(date.slice(5).replace("-","/"))}</div></th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${LOGIC.COLLECT_KEYS.map((key) => `
                <tr>
                  <td>${esc(LOGIC.COLLECT_LABELS[key])}</td>
                  ${days.map((day) => `<td class="${day.date === todayISO() ? "today" : ""}"><div class="mark">${esc(LOGIC.COLLECT_MARKS[day.collect[key] || ""])}</div></td>`).join("")}
                </tr>
              `).join("")}
              ${caseObj.meds.map((med) => `
                <tr>
                  <td>${esc(med.name)}<div class="panel-sub">${esc(LOGIC.MED_ROUTE_LABELS[med.route])}</div></td>
                  ${days.map((day) => {
                    const on = med.startDate && med.startDate <= day.date && (!med.endDate || med.endDate >= day.date);
                    return `<td class="${day.date === todayISO() ? "today" : ""}">${on ? `<span class="med-band ${med.route === "oral" ? "oral" : "inj"}">●</span>` : ""}</td>`;
                  }).join("")}
                </tr>
              `).join("")}
              <tr>
                <td>イベント</td>
                ${days.map((day) => {
                  const list = caseObj.events.filter((eventObj) => eventObj.date === day.date);
                  return `<td class="${day.date === todayISO() ? "today" : ""}"><div class="cell-stack">${list.map((eventObj) => `<button class="event-dot" title="${esc(LOGIC.EVENT_TYPE_LABELS[eventObj.type] + " " + eventObj.title)}" onclick="showEventInfo('${eventObj.id}')">●</button>`).join("")}</div></td>`;
                }).join("")}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  `;
}

function showEventInfo(eventId){
  const caseObj = currentCase();
  const eventObj = caseObj.events.find((e) => e.id === eventId);
  showModal(`
    <h3>${esc(eventObj.title)}</h3>
    <p class="sub">${esc(eventObj.date)} / ${esc(LOGIC.EVENT_TYPE_LABELS[eventObj.type])}</p>
    <div style="margin-top:12px">${esc(eventObj.note || "メモなし")}</div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">閉じる</button></div>
  `);
}

function renderTrash(){
  const items = trashCases().sort((a,b) => (b.deletedAt || "").localeCompare(a.deletedAt || ""));
  return `
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">Trash</div>
          <h1 class="page">ゴミ箱</h1>
          <div class="sub">削除済み症例は30日で自動 purge。復元か完全削除のみ。</div>
        </div>
        <button class="btn btn-ghost" onclick="go('list')">一覧へ戻る</button>
      </div>
    </section>
    ${items.length ? `<div class="case-grid">${items.map((caseObj) => `
      <article class="case-card">
        <div class="case-top">
          <div>
            <div class="case-label">${esc(LOGIC.formatLabel(caseObj) || "未設定")}</div>
            <div class="case-cc">${esc(caseObj.cc || "一言未入力")}</div>
          </div>
          <div class="badge trash">削除 ${esc((caseObj.deletedAt || "").slice(0,10))}</div>
        </div>
        <div class="inline-actions" style="margin-top:14px">
          <button class="btn btn-ghost" onclick="restoreCase('${caseObj.id}')">復元</button>
          <button class="btn btn-danger" onclick="permanentlyDeleteCase('${caseObj.id}')">完全削除</button>
        </div>
      </article>
    `).join("")}</div>` : `<div class="empty">ゴミ箱は空です。</div>`}
  `;
}

async function hydrateCaseAsync(){
  const caseObj = currentCase();
  if(!caseObj){ return; }
  await resolvePhotoUrls(caseObj);
  const grid = document.getElementById("photoGrid");
  if(grid){ grid.innerHTML = renderPhotoGrid(caseObj); }
}

function toggleSection(button, id){
  const el = document.getElementById(id);
  if(!el){ return; }
  el.classList.toggle("hide");
  button.textContent = el.classList.contains("hide") ? "開く" : "閉じる";
}

async function boot(){
  DB = await Store.load();
  const purged = LOGIC.purgeTrash(DB, todayISO());
  DB = purged.data;
  for(const caseObj of DB.cases){
    if(caseObj.status === "active" && !caseObj.deletedAt){
      Object.assign(caseObj, LOGIC.rolloverCase(caseObj, todayISO()));
    }
  }
  SAVE_OK = await Store.save(DB);
  LAST_SAVE_AT = new Date().toISOString();
  render();
  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "visible"){
      let changed = false;
      DB.cases.forEach((caseObj) => {
        if(caseObj.status === "active" && !caseObj.deletedAt){
          const before = JSON.stringify(caseObj.days);
          Object.assign(caseObj, LOGIC.rolloverCase(caseObj, todayISO()));
          if(JSON.stringify(caseObj.days) !== before){ changed = true; }
        }
      });
      if(changed){ persist(); }
    }
  });
}

boot();
</script>
</body>
</html>
