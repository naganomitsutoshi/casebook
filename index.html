<!DOCTYPE html>
<!-- Casebook v4: local-only inpatient tracker. v4 is a mobile-first design refresh (bottom nav, dark mode, compact rows, sticky tabs); data model and logic unchanged from v3. Implemented directly by Claude (Fable 5), no Codex. -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f8faf8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#121a15" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Casebook</title>
<style>
  :root{
    color-scheme:light dark;
    --paper:#f4f6f4;
    --paper-hi:#f8faf8;
    --paper-lo:#eef2ee;
    --veil:rgba(248,250,248,.88);
    --card:rgba(255,255,255,.92);
    --surface-2:#f8f7f2;
    --sheet:#ffffff;
    --field:#fcfdfa;
    --btn-bg:rgba(255,255,255,.86);
    --ink:#16231d;
    --ink-soft:#516159;
    --ink-faint:#85948b;
    --on-accent:#ffffff;
    --line:#d8ded8;
    --line-soft:#e9eee9;
    --accent:#1f6f5f;
    --accent-deep:#164f44;
    --accent-soft:#e4f1ed;
    --accent-line:#b6d7ce;
    --warn:#ba7a1a;
    --warn-soft:#f7ecd9;
    --warn-line:#edcf9a;
    --danger:#b54444;
    --danger-soft:#fdecec;
    --danger-line:#efc5c5;
    --done:#507c53;
    --done-soft:#e7f0e7;
    --info:#3d648d;
    --info-soft:#e7f0fa;
    --glow:rgba(31,111,95,.08);
    --shadow:0 1px 2px rgba(22,35,29,.05),0 10px 30px rgba(22,35,29,.07);
    --radius:16px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --paper:#121a15;
      --paper-hi:#151e18;
      --paper-lo:#0e1511;
      --veil:rgba(18,26,21,.88);
      --card:rgba(26,36,30,.94);
      --surface-2:#202b24;
      --sheet:#1a241e;
      --field:#151f19;
      --btn-bg:rgba(32,43,36,.9);
      --ink:#e4ece6;
      --ink-soft:#a8b6ad;
      --ink-faint:#75857b;
      --on-accent:#0d1410;
      --line:#2e3a32;
      --line-soft:#27322b;
      --accent:#54ab93;
      --accent-deep:#7cc4ae;
      --accent-soft:#1c352d;
      --accent-line:#2f5548;
      --warn:#d8a24f;
      --warn-soft:#352a15;
      --warn-line:#5c4720;
      --danger:#dd8080;
      --danger-soft:#3a2121;
      --danger-line:#5c3232;
      --done:#84b687;
      --done-soft:#20301f;
      --info:#8db4dd;
      --info-soft:#1c2a3a;
      --glow:rgba(84,171,147,.10);
      --shadow:0 1px 2px rgba(0,0,0,.35),0 10px 30px rgba(0,0,0,.3);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Inter","Noto Sans JP",system-ui,sans-serif;
    background:
      radial-gradient(circle at top right, var(--glow), transparent 28%),
      linear-gradient(180deg, var(--paper-hi) 0%, var(--paper) 55%, var(--paper-lo) 100%);
    color:var(--ink);
    line-height:1.55;
    min-height:100vh;
    padding-bottom:72px;
  }
  button,input,textarea,select{font:inherit}
  button{border:none;background:none;cursor:pointer;color:inherit}
  textarea{resize:vertical}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  .hide{display:none!important}

  .topbar{
    position:sticky;top:0;z-index:50;
    backdrop-filter:blur(14px);
    background:var(--veil);
    border-bottom:1px solid var(--line-soft);
    padding-top:env(safe-area-inset-top);
  }
  .topbar-in{
    max-width:1100px;margin:0 auto;padding:14px 18px;
    display:flex;align-items:center;gap:12px;
  }
  .brand{display:flex;flex-direction:column;cursor:pointer}
  .brand strong{font-size:18px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
  .brand strong::before{
    content:"";width:10px;height:10px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#6ea48d);
    box-shadow:0 0 0 5px var(--glow);
  }
  .brand span{font-size:11px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase}
  .spacer{flex:1}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .pill-btn,.tab-btn,.chip,.btn{
    min-height:44px;border-radius:12px;transition:.15s ease;
  }
  .pill-btn,.tab-btn,.chip{
    border:1px solid var(--line);background:var(--btn-bg);
    padding:0 14px;display:inline-flex;align-items:center;gap:8px;
  }
  .pill-btn:hover,.tab-btn:hover,.chip:hover{border-color:var(--accent);color:var(--accent)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:0 16px;font-weight:700;
  }
  .btn-primary{background:var(--accent);color:var(--on-accent);box-shadow:var(--shadow)}
  .btn-primary:hover{background:var(--accent-deep)}
  .btn-ghost{background:var(--btn-bg);border:1px solid var(--line)}
  .btn-danger{background:var(--danger-soft);color:var(--danger);border:1px solid var(--danger-line)}
  .btn-block{width:100%}
  .chip,.tab-btn,.pill-btn{font-size:13px;font-weight:600}
  .chip.on{background:var(--ink);color:var(--paper-hi);border-color:var(--ink)}
  .count-badge{
    min-width:22px;height:22px;padding:0 7px;border-radius:999px;
    background:var(--accent-soft);color:var(--accent);display:inline-flex;
    align-items:center;justify-content:center;font-size:12px;font-weight:700;
  }

  .bottombar{
    position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;
    background:var(--veil);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    padding:6px 10px calc(6px + env(safe-area-inset-bottom));
  }
  .bottombar-in{display:flex;gap:6px;max-width:640px;margin:0 auto}
  .bnav{
    position:relative;flex:1;min-height:52px;border-radius:12px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-size:11px;font-weight:700;color:var(--ink-soft);transition:.15s ease;
  }
  .bnav .ico{font-size:18px;line-height:1.2}
  .bnav.on{color:var(--accent);background:var(--accent-soft)}
  .bnav .count-badge{
    position:absolute;top:2px;right:calc(50% - 28px);
    min-width:18px;height:18px;font-size:10px;padding:0 5px;
    background:var(--accent);color:var(--on-accent);
  }

  main{max-width:1100px;margin:0 auto;padding:22px 18px}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);font-weight:800;margin-bottom:8px}
  h1.page{font-size:30px;line-height:1.1;letter-spacing:-.03em;margin-bottom:6px}
  .sub{color:var(--ink-soft);font-size:14px;max-width:780px}

  .hero{
    background:var(--card);
    border:1px solid var(--line);box-shadow:var(--shadow);
    border-radius:28px;padding:22px 22px 18px;margin-bottom:20px;
  }
  .hero-top{display:flex;align-items:flex-start;gap:16px;justify-content:space-between;flex-wrap:wrap}
  .privacy{
    margin-top:16px;background:var(--warn-soft);
    border:1px solid var(--warn-line);border-radius:14px;padding:12px 14px;
    color:var(--warn);font-size:13px;font-weight:600;
  }
  .save-line{margin-top:12px;font-size:12px;color:var(--ink-faint)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:20px 0}

  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
  .metric{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:16px;box-shadow:var(--shadow)
  }
  .metric .k{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.12em}
  .metric .v{margin-top:8px;font-size:30px;line-height:1;font-weight:800;letter-spacing:-.04em}
  .metric .s{margin-top:5px;font-size:13px;color:var(--ink-soft)}

  .case-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
  .case-card{
    background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);padding:18px;cursor:pointer;transition:.16s ease;
  }
  .case-card:hover{transform:translateY(-1px);border-color:var(--accent)}
  .case-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .case-label{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .case-cc{margin-top:4px;color:var(--ink-soft);font-size:14px}
  .case-day{font-size:12px;color:var(--ink-faint);white-space:nowrap}
  .case-sum{
    margin-top:10px;font-size:13px;color:var(--ink-soft);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .case-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .badge{
    border-radius:999px;padding:7px 11px;font-size:12px;font-weight:700;
    display:inline-flex;align-items:center;gap:6px;
  }
  .badge.active{background:var(--accent-soft);color:var(--accent)}
  .badge.todo{background:var(--info-soft);color:var(--info)}
  .badge.wait{background:var(--warn-soft);color:var(--warn)}
  .badge.done{background:var(--done-soft);color:var(--done)}
  .badge.trash{background:var(--danger-soft);color:var(--danger)}
  .badge.severity-stable{background:var(--done-soft);color:var(--done)}
  .badge.severity-watcher{background:var(--warn-soft);color:var(--warn)}
  .badge.severity-unstable{background:var(--danger-soft);color:var(--danger)}
  .empty{
    padding:40px 18px;border:1px dashed var(--line);border-radius:20px;
    text-align:center;color:var(--ink-faint);background:var(--card)
  }

  .backline{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .backlink{font-size:13px;font-weight:700;color:var(--ink-soft);min-height:44px;display:inline-flex;align-items:center}
  .shell{
    display:grid;grid-template-columns:minmax(0,1.25fr) minmax(300px,.75fr);gap:18px;
    align-items:start;
  }
  .stack{display:flex;flex-direction:column;gap:16px}
  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:22px;
    box-shadow:var(--shadow);overflow:hidden;
  }
  .panel-head{
    padding:16px 18px;border-bottom:1px solid var(--line-soft);
    display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap
  }
  .panel-head h2{font-size:16px;letter-spacing:-.02em}
  .panel-sub{font-size:12px;color:var(--ink-faint)}
  .panel-body{padding:16px 18px}

  .case-head{
    background:
      linear-gradient(135deg, var(--glow), transparent 40%),
      var(--card);
  }
  .case-head .title-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .case-head .title{font-size:26px;line-height:1.05;font-weight:800;letter-spacing:-.04em}
  .case-head .meta{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;color:var(--ink-soft);font-size:13px}
  .tabs-bar{
    display:flex;gap:8px;margin-top:14px;overflow-x:auto;
    padding:4px 0;-webkit-overflow-scrolling:touch;
  }
  .tab-btn{flex-shrink:0}
  .tab-btn.on{background:var(--ink);color:var(--paper-hi);border-color:var(--ink)}

  .input,.textarea,.select{
    width:100%;border:1px solid var(--line);border-radius:14px;background:var(--field);
    padding:12px 13px;color:var(--ink);font-size:16px;
  }
  .input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .add-row{display:flex;gap:8px;margin-top:12px}
  .add-row .input{flex:1;min-width:0}

  .list{display:flex;flex-direction:column;gap:8px}
  .row-item{
    display:flex;gap:6px;align-items:center;
    border:1px solid var(--line);border-radius:14px;background:var(--surface-2);
    padding:4px 4px 4px 8px;
  }
  .row-check{
    width:44px;height:44px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;
    position:relative;
  }
  .row-check::before{
    content:"";width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
    position:absolute;
  }
  .row-check span{position:relative;z-index:1}
  .row-check.done::before{background:var(--done);border-color:var(--done)}
  .row-check.done{color:#fff}
  .row-check.wait::before{background:var(--warn);border-color:var(--warn)}
  .row-check.wait{color:#fff}
  .row-dot{
    width:24px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  }
  .row-dot::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--accent-line)}
  .row-input{
    flex:1;min-width:0;border:none;background:transparent;color:var(--ink);
    font-size:16px;font-weight:600;padding:11px 4px;border-radius:8px;
  }
  .row-input:focus{outline:none;background:var(--field);box-shadow:0 0 0 2px var(--accent-soft)}
  .row-input.muted{text-decoration:line-through;color:var(--ink-faint)}
  .row-del{
    width:40px;height:44px;flex-shrink:0;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-faint);font-size:18px;
  }
  .row-del:hover{color:var(--danger);background:var(--danger-soft)}
  .inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .compact-btn{
    min-height:36px;padding:0 10px;border-radius:10px;border:1px solid var(--line);
    background:var(--btn-bg);font-size:12px;font-weight:700
  }
  .compact-btn:hover{border-color:var(--accent);color:var(--accent)}

  .prob-card{border:1px solid var(--line);border-radius:18px;background:var(--surface-2);overflow:hidden}
  .prob-top{display:flex;gap:10px;align-items:center;padding:12px}
  .prob-order{font-size:12px;font-weight:800;color:var(--accent);width:26px;flex-shrink:0}
  .prob-title{flex:1;min-width:0}
  .prob-title .input{font-weight:700;background:var(--sheet)}
  .prob-status{font-size:12px;font-weight:700;border-radius:999px;padding:6px 10px;min-height:36px;background:var(--done-soft);color:var(--done)}
  .prob-status.off{background:var(--surface-2);color:var(--ink-faint);border:1px solid var(--line)}
  .prob-body{padding:0 12px 12px}
  .severity-row{display:flex;gap:8px;flex-wrap:wrap}
  .severity-btn.on{border-color:transparent;color:#fff}
  .severity-btn.on.severity-stable{background:var(--done)}
  .severity-btn.on.severity-watcher{background:var(--warn)}
  .severity-btn.on.severity-unstable{background:var(--danger)}

  .collapse{
    border:1px solid var(--line);border-radius:18px;background:var(--surface-2)
  }
  .collapse-head{
    padding:14px 15px;display:flex;justify-content:space-between;gap:12px;align-items:center
  }
  .collapse-body{padding:0 15px 15px}

  .routine-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .routine-btn{
    min-height:52px;padding:10px 12px;border-radius:14px;border:1px solid var(--line);
    background:var(--sheet);text-align:left;display:flex;gap:10px
  }
  .routine-btn.on{background:var(--accent-soft);border-color:var(--accent-line)}
  .routine-box{
    width:18px;height:18px;border-radius:5px;border:2px solid currentColor;display:flex;
    align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:11px
  }
  .routine-copy strong{display:block;font-size:13px}
  .routine-copy span{display:block;font-size:11px;color:var(--ink-faint);margin-top:1px}

  .photo-note{
    margin-top:12px;padding:11px 12px;border-radius:14px;background:var(--warn-soft);
    border:1px solid var(--warn-line);color:var(--warn);font-size:12px;font-weight:700
  }
  .file-btn{position:relative;overflow:hidden;cursor:pointer}
  .file-btn input{position:absolute;inset:0;opacity:0;width:100%;cursor:pointer}
  .photo-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
  .photo-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--sheet)}
  .photo-card img{display:block;width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--surface-2)}
  .photo-actions{padding:10px;display:flex;gap:8px;flex-wrap:wrap}

  .event-list,.med-list{display:flex;flex-direction:column;gap:10px}
  .event-item,.med-item{
    padding:12px;border:1px solid var(--line);border-radius:16px;background:var(--surface-2)
  }
  .line-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .line-title{font-weight:700}
  .line-sub{font-size:12px;color:var(--ink-soft);margin-top:4px}

  .log-group{display:flex;flex-direction:column;gap:12px}
  .log-card{
    border:1px solid var(--line);border-radius:18px;background:var(--surface-2);padding:14px
  }
  .log-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}

  .timeline-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px}
  .timeline{
    min-width:720px;border-collapse:separate;border-spacing:0;width:100%;background:var(--sheet)
  }
  .timeline th,.timeline td{
    border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
    padding:8px;min-width:40px;vertical-align:middle
  }
  .timeline th:first-child,.timeline td:first-child{
    position:sticky;left:0;background:var(--field);z-index:2;min-width:140px
  }
  .timeline th.today,.timeline td.today{background:var(--accent-soft)}
  .timeline th.today{box-shadow:inset 0 -3px 0 var(--accent)}
  .timeline td.band-oral{background:var(--info-soft)}
  .timeline td.band-inj{background:var(--warn-soft)}
  .band-tag{display:block;font-size:10px;font-weight:800;text-align:center;color:var(--ink-soft);white-space:nowrap}
  .cell-stack{display:flex;flex-direction:column;gap:4px;align-items:center}
  .event-dot{
    width:24px;height:24px;border-radius:50%;background:var(--accent);color:var(--on-accent);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin:0 auto
  }
  .tl-legend{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .legend-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
  .legend-chip.oral{background:var(--info-soft);color:var(--info)}
  .legend-chip.inj{background:var(--warn-soft);color:var(--warn)}
  .legend-chip.ev{background:var(--accent-soft);color:var(--accent)}

  .modal-bg{
    position:fixed;inset:0;background:rgba(10,16,12,.55);backdrop-filter:blur(4px);
    z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0
  }
  @media(min-width:620px){.modal-bg{align-items:center;padding:20px}}
  .modal{
    width:100%;max-width:560px;max-height:92vh;overflow:auto;
    border-radius:24px 24px 0 0;background:var(--sheet);padding:22px;
    padding-bottom:calc(22px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 40px rgba(0,0,0,.2)
  }
  @media(min-width:620px){.modal{border-radius:24px;padding-bottom:22px}}
  .modal h3{font-size:22px;letter-spacing:-.03em}
  .modal p.sub{margin-top:6px;margin-bottom:16px}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}

  .toast{
    position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper-hi);padding:12px 16px;border-radius:12px;
    box-shadow:0 10px 32px rgba(0,0,0,.22);opacity:0;transition:.22s;z-index:110;pointer-events:none;
    max-width:calc(100vw - 32px);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:920px){
    .shell{grid-template-columns:1fr}
    .case-grid{grid-template-columns:1fr}
  }
  @media(max-width:640px){
    .topbar{position:static}
    .topbar .header-actions{display:none}
    .bottombar{display:block}
    body{padding-bottom:calc(88px + env(safe-area-inset-bottom))}
    .tabs-bar{
      position:sticky;top:0;z-index:40;
      background:var(--veil);backdrop-filter:blur(12px);
      margin:14px -14px 0;padding:10px 14px;
    }
    .toast{bottom:calc(88px + env(safe-area-inset-bottom))}
  }
  @media(max-width:520px){
    main{padding:16px 14px}
    .topbar-in{padding:12px 14px}
    h1.page{font-size:24px}

<script id="logic">
function logicFactory(){
  const SEVERITY_LABELS = { stable:"安定", watcher:"要注意", unstable:"不安定" };
  const MED_ROUTE_LABELS = { oral:"内服", inj:"注射" };
  const EVENT_TYPE_LABELS = { test:"検査", surgery:"手術", procedure:"処置", treatment:"治療", other:"その他" };
  const ROUTINE = [
    {k:"meds", t:"休薬・内服調整", h:"抗血栓薬・DM薬・サプリ"},
    {k:"allergy", t:"アレルギー・予防接種", h:"FA/DA・肺炎球菌等"},
    {k:"sdm", t:"意思決定支援", h:"家族・代理決定者・ゴール"},
    {k:"code", t:"Code status", h:"急変時方針（暫定）"},
    {k:"outlook", t:"入院後の見通し", h:"推定在院日数・退院方向"},
    {k:"bps", t:"BPSモデル", h:"心理・社会・Matters Most"},
    {k:"deepin", t:"DEEP-IN＋CFS", h:"高齢者機能評価"},
    {k:"risk", t:"リスクスクリーニング", h:"嚥下・転倒・褥瘡・VTE・抑制"},
    {k:"rehab", t:"リハGoal", h:"病前ADL・退院先・退院基準"},
    {k:"acp", t:"退院支援・ACP", h:"多職種・介護保険・IC"}
  ];

  function makeId(){
    return Math.random().toString(36).slice(2,10);
  }

  function isoNow(){
    return new Date().toISOString();
  }

  function makeEmptyDay(date){
    return { date, todos:[], waits:[], hooks:[] };
  }

  function dayNumber(caseObj, today){
    if(!caseObj || !caseObj.admittedAt || !today){ return 1; }
    const start = new Date(caseObj.admittedAt + "T00:00:00");
    const end = new Date(today + "T00:00:00");
    const diff = Math.floor((end - start) / 86400000);
    return Number.isFinite(diff) && diff >= 0 ? diff + 1 : 1;
  }

  function normalizeRoutine(routine){
    const source = routine && typeof routine === "object" ? routine : {};
    const next = {};
    ROUTINE.forEach(function(item){
      next[item.k] = !!source[item.k];
    });
    if(source.vte || source.delirium || source.risk){ next.risk = true; }
    if(source.disposition || source.rehab){ next.rehab = true; }
    return next;
  }

  function routineLabels(routine){
    const safe = normalizeRoutine(routine);
    return ROUTINE.filter(function(item){ return !!safe[item.k]; }).map(function(item){ return item.t; });
  }

  function ensureCaseShape(caseObj){
    const base = {
      id:makeId(),
      createdAt:Date.now(),
      status:"active",
      deletedAt:null,
      severity:"",
      ageBand:"",
      sex:"",
      cc:"",
      admittedAt:"",
      dischargedAt:null,
      admission:{ note:"", photoIds:[], routine:{} },
      patientSummary:"",
      contingency:[],
      problems:[],
      meds:[],
      events:[],
      days:[],
      summary:{ course:"", outcome:"", myPractice:"" },
      lastExportedAt:null
    };
    const out = Object.assign({}, base, caseObj || {});
    out.admission = Object.assign({}, base.admission, out.admission || {});
    out.admission.photoIds = Array.isArray(out.admission.photoIds) ? out.admission.photoIds.slice() : [];
    out.admission.routine = normalizeRoutine(out.admission.routine);
    out.patientSummary = typeof out.patientSummary === "string" ? out.patientSummary : "";
    out.contingency = Array.isArray(out.contingency) ? out.contingency.map(function(item){
      return { id:item && item.id ? item.id : makeId(), text:item && item.text ? String(item.text) : "" };
    }).filter(function(item){ return item.text; }) : [];
    out.problems = Array.isArray(out.problems) ? out.problems.map(function(p){
      return { id:p.id || makeId(), title:p.title || "", assessment:p.assessment || "", active:p.active !== false };
    }) : [];
    out.meds = Array.isArray(out.meds) ? out.meds.map(function(m){
      return {
        id:m.id || makeId(),
        name:m.name || "",
        route:m.route === "inj" ? "inj" : "oral",
        startDate:m.startDate || "",
        endDate:m.endDate || null,
        note:m.note || ""
      };
    }) : [];
    out.events = Array.isArray(out.events) ? out.events.map(function(e){
      return {
        id:e.id || makeId(),
        date:e.date || "",
        type:EVENT_TYPE_LABELS[e.type] ? e.type : "other",
        title:e.title || "",
        note:e.note || ""
      };
    }) : [];
    out.days = Array.isArray(out.days) ? out.days.map(function(d){
      const day = Object.assign(makeEmptyDay(d.date || ""), d || {});
      delete day.collect;
      day.todos = Array.isArray(day.todos) ? day.todos.map(function(t){ return { id:t.id || makeId(), text:t.text || "", done:!!t.done }; }) : [];
      day.waits = Array.isArray(day.waits) ? day.waits.map(function(w){ return { id:w.id || makeId(), text:w.text || "", resolved:!!w.resolved }; }) : [];
      day.hooks = Array.isArray(day.hooks) ? day.hooks.map(function(h){ return { id:h.id || makeId(), text:h.text || "" }; }) : [];
      return day;
    }).sort(function(a,b){ return a.date.localeCompare(b.date); }) : [];
    out.summary = Object.assign({}, base.summary, out.summary || {});
    return out;
  }

  function normalizeData(data){
    const safe = data && typeof data === "object" ? data : {};
    return {
      version:2,
      cases:Array.isArray(safe.cases) ? safe.cases.map(ensureCaseShape) : []
    };
  }

  function getDay(caseObj, date){
    if(!caseObj || !Array.isArray(caseObj.days)){ return null; }
    for(var i=0;i<caseObj.days.length;i+=1){
      if(caseObj.days[i].date === date){ return caseObj.days[i]; }
    }
    return null;
  }

  function getLatestDay(caseObj){
    if(!caseObj || !Array.isArray(caseObj.days) || !caseObj.days.length){ return null; }
    return caseObj.days[caseObj.days.length - 1];
  }

  function ensureTodayDay(caseObj, today){
    var existing = getDay(caseObj, today);
    if(existing){ return existing; }
    var day = makeEmptyDay(today);
    caseObj.days.push(day);
    caseObj.days.sort(function(a,b){ return a.date.localeCompare(b.date); });
    return getDay(caseObj, today);
  }

  function rolloverCase(caseObj, today){
    var c = ensureCaseShape(caseObj);
    var existing = getDay(c, today);
    if(existing){ return c; }
    var latest = getLatestDay(c);
    if(!latest || !latest.date || latest.date >= today){
      c.days.push(makeEmptyDay(today));
      c.days.sort(function(a,b){ return a.date.localeCompare(b.date); });
      return c;
    }
    var nextDay = makeEmptyDay(today);
    nextDay.todos = latest.todos.filter(function(t){ return !t.done; }).map(function(t){
      return { id:makeId(), text:t.text, done:false };
    });
    nextDay.waits = latest.waits.filter(function(w){ return !w.resolved; }).map(function(w){
      return { id:makeId(), text:w.text, resolved:false };
    });
    c.days.push(nextDay);
    c.days.sort(function(a,b){ return a.date.localeCompare(b.date); });
    return c;
  }

  function purgeTrash(data, todayIso){
    var model = normalizeData(data);
    var cutoff = new Date(todayIso + "T00:00:00").getTime() - 30 * 86400000;
    var purgedCaseIds = [];
    model.cases = model.cases.filter(function(caseObj){
      if(!caseObj.deletedAt){ return true; }
      var ts = new Date(caseObj.deletedAt).getTime();
      if(Number.isFinite(ts) && ts < cutoff){
        purgedCaseIds.push(caseObj.id);
        return false;
      }
      return true;
    });
    return { data:model, purgedCaseIds:purgedCaseIds };
  }

  function formatLabel(caseObj){
    var sex = caseObj.sex === "M" ? "男性" : caseObj.sex === "F" ? "女性" : "";
    return [caseObj.ageBand, sex, caseObj.cc].filter(Boolean).join("・");
  }

  function latestChangeItems(caseObj, today){
    return {
      meds:caseObj.meds.filter(function(m){ return m.startDate === today || m.endDate === today; }),
      events:caseObj.events.filter(function(e){ return e.date === today; })
    };
  }

  function severityLabel(severity){
    return SEVERITY_LABELS[severity] || "";
  }

  function buildDailyExport(data, today){
    var model = normalizeData(data);
    var lines = ["# Casebook 書き出し " + today];
    model.cases.filter(function(c){ return c.status === "active" && !c.deletedAt; }).forEach(function(caseObj){
      var day = getDay(caseObj, today) || makeEmptyDay(today);
      var changes = latestChangeItems(caseObj, today);
      var sev = severityLabel(caseObj.severity);
      lines.push("## 症例: " + (sev ? "【" + sev + "】" : "") + formatLabel(caseObj) + "（病日" + dayNumber(caseObj, today) + "）");
      if(caseObj.patientSummary){
        lines.push("P: " + caseObj.patientSummary.replace(/\n/g, " "));
      }
      lines.push("### 問題リスト");
      var activeProblems = caseObj.problems.filter(function(p){ return p.active !== false && p.title; });
      if(activeProblems.length){
        activeProblems.forEach(function(problem, index){
          var text = "- #" + (index + 1) + " " + problem.title;
          if(problem.assessment){ text += " — A: " + problem.assessment.replace(/\n/g, " "); }
          lines.push(text);
        });
      } else {
        lines.push("- なし");
      }
      lines.push("### 今日やる");
      if(day.todos.length){ day.todos.forEach(function(todo){ lines.push("- [" + (todo.done ? "x" : " ") + "] " + todo.text); }); }
      else { lines.push("- なし"); }
      lines.push("### 待ち");
      if(day.waits.length){ day.waits.forEach(function(wait){ lines.push("- [" + (wait.resolved ? "x" : " ") + "] " + wait.text); }); }
      else { lines.push("- なし"); }
      lines.push("### もしもプラン");
      if(caseObj.contingency.length){ caseObj.contingency.forEach(function(item){ lines.push("- " + item.text); }); }
      else { lines.push("- なし"); }
      lines.push("### 引っかかり");
      if(day.hooks.length){ day.hooks.forEach(function(hook){ lines.push("- " + hook.text); }); }
      else { lines.push("- なし"); }
      lines.push("### 薬剤・イベント（本日変更分）");
      if(!changes.meds.length && !changes.events.length){
        lines.push("- 変更なし");
      } else {
        changes.meds.forEach(function(med){
          var head = med.startDate === today ? "開始" : "終了";
          var end = med.endDate ? "〜" + med.endDate.slice(5).replace("-", "/") : "〜";
          lines.push("- " + head + ": " + med.name + " " + MED_ROUTE_LABELS[med.route] + "（" + med.startDate.slice(5).replace("-", "/") + end + "）");
        });
        changes.events.forEach(function(eventObj){
          lines.push("- イベント: " + eventObj.date.slice(5).replace("-", "/") + " " + EVENT_TYPE_LABELS[eventObj.type] + " " + eventObj.title);
        });
      }
      lines.push("### 写真");
      lines.push("- 入院時写真 " + caseObj.admission.photoIds.length + "枚 → Obsidian へ共有済みのものを /casebook が OCR");
    });
    return lines.join("\n");
  }

  function buildDischargeExport(caseObj){
    var c = ensureCaseShape(caseObj);
    var routineList = routineLabels(c.admission.routine);
    var lines = [
      "---",
      "type: casebook-discharge",
      "date: " + (c.dischargedAt || c.admittedAt || ""),
      "label: " + formatLabel(c),
      "---",
      "",
      "# " + formatLabel(c),
      "",
      "## 入院期間",
      "- 入院日: " + (c.admittedAt || ""),
      "- 退院日: " + (c.dischargedAt || ""),
      "- 重症度: " + (severityLabel(c.severity) || "未設定"),
      "",
      "## 患者サマリ",
      c.patientSummary || "- なし",
      "",
      "## 入院時記録",
      c.admission.note || "- なし",
      "",
      "## ルーチン",
    ];
    if(routineList.length){ routineList.forEach(function(label){ lines.push("- " + label); }); }
    else { lines.push("- なし"); }
    lines.push("");
    lines.push("## 問題リスト");
    if(c.problems.length){
      c.problems.forEach(function(problem, index){
        lines.push("### #" + (index + 1) + " " + (problem.title || "未設定"));
        if(problem.assessment){ lines.push(problem.assessment); }
        lines.push("");
      });
    } else {
      lines.push("- なし");
      lines.push("");
    }
    lines.push("## 日々のログ");
    if(c.days.length){
      c.days.forEach(function(day){
        lines.push("### " + day.date);
        if(day.todos.length){ day.todos.forEach(function(todo){ lines.push("- Todo [" + (todo.done ? "x" : " ") + "] " + todo.text); }); }
        if(day.waits.length){ day.waits.forEach(function(wait){ lines.push("- Wait [" + (wait.resolved ? "x" : " ") + "] " + wait.text); }); }
        if(day.hooks.length){ day.hooks.forEach(function(hook){ lines.push("- Hook " + hook.text); }); }
        lines.push("");
      });
    } else {
      lines.push("- なし");
      lines.push("");
    }
    lines.push("## 薬剤一覧");
    if(c.meds.length){
      c.meds.forEach(function(med){
        lines.push("- " + med.name + " / " + MED_ROUTE_LABELS[med.route] + " / " + med.startDate + "〜" + (med.endDate || "継続中") + (med.note ? " / " + med.note.replace(/\n/g, " ") : ""));
      });
    } else {
      lines.push("- なし");
    }
    lines.push("");
    lines.push("## イベント一覧");
    if(c.events.length){
      c.events.forEach(function(eventObj){
        lines.push("- " + eventObj.date + " / " + EVENT_TYPE_LABELS[eventObj.type] + " / " + eventObj.title + (eventObj.note ? " / " + eventObj.note.replace(/\n/g, " ") : ""));
      });
    } else {
      lines.push("- なし");
    }
    lines.push("");
    lines.push("## 退院時サマリ");
    lines.push("### 経過要約");
    lines.push(c.summary.course || "");
    lines.push("");
    lines.push("### 私の実践");
    lines.push(c.summary.myPractice || "");
    lines.push("");
    lines.push("### 転帰");
    lines.push(c.summary.outcome || "");
    lines.push("");
    lines.push("## 退院時未解消の待ち");
    var lastDay = getLatestDay(c);
    var pendingWaits = lastDay ? lastDay.waits.filter(function(wait){ return !wait.resolved && wait.text; }).map(function(wait){ return wait.text; }) : [];
    if(pendingWaits.length){
      pendingWaits.forEach(function(text){ lines.push("- " + text); });
    } else {
      lines.push("- なし");
    }
    return lines.join("\n");
  }

  return {
    SEVERITY_LABELS:SEVERITY_LABELS,
    MED_ROUTE_LABELS:MED_ROUTE_LABELS,
    EVENT_TYPE_LABELS:EVENT_TYPE_LABELS,
    ROUTINE:ROUTINE,
    makeId:makeId,
    isoNow:isoNow,
    makeEmptyDay:makeEmptyDay,
    ensureCaseShape:ensureCaseShape,
    normalizeData:normalizeData,
    getDay:getDay,
    getLatestDay:getLatestDay,
    ensureTodayDay:ensureTodayDay,
    rolloverCase:rolloverCase,
    purgeTrash:purgeTrash,
    formatLabel:formatLabel,
    severityLabel:severityLabel,
    routineLabels:routineLabels,
    dayNumber:dayNumber,
    buildDailyExport:buildDailyExport,
    buildDischargeExport:buildDischargeExport
  };
}
var LOGIC = logicFactory();
if(typeof module !== "undefined"){ module.exports = LOGIC; }
</script>

<script>
const KEY = "casebook:v2";
const PHOTO_DB = "casebook-photos";
const PHOTO_STORE = "photos";
const ROUTINE = LOGIC.ROUTINE;
const todayISO = () => new Date().toISOString().slice(0,10);
const esc = (s) => String(s || "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const timeLabel = (iso) => new Date(iso).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

const Store = {
  mem:null,
  empty(){ return { version:2, cases:[] }; },
  async load(){
    if(window.storage && typeof window.storage.get === "function"){
      try{
        const res = await window.storage.get(KEY);
        const data = res && res.value ? JSON.parse(res.value) : this.empty();
        this.mem = LOGIC.normalizeData(data);
        return this.mem;
      }catch(_e){}
    }
    try{
      const raw = localStorage.getItem(KEY);
      const data = raw ? JSON.parse(raw) : this.empty();
      this.mem = LOGIC.normalizeData(data);
      return this.mem;
    }catch(_e){}
    return this.mem || this.empty();
  },
  async save(data){
    this.mem = LOGIC.normalizeData(data);
    const payload = JSON.stringify(this.mem);
    if(window.storage && typeof window.storage.set === "function"){
      try{
        await window.storage.set(KEY, payload);
        return true;
      }catch(_e){}
    }
    try{
      localStorage.setItem(KEY, payload);
      return true;
    }catch(_e){}
    return false;
  }
};

const Photos = {
  dbp:null,
  async db(){
    if(this.dbp){ return this.dbp; }
    this.dbp = new Promise((resolve, reject) => {
      const req = indexedDB.open(PHOTO_DB, 1);
      req.onupgradeneeded = function(){
        const db = req.result;
        const store = db.createObjectStore(PHOTO_STORE, { keyPath:"id" });
        store.createIndex("caseId", "caseId", { unique:false });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return this.dbp;
  },
  async add(caseId, blob){
    const db = await this.db();
    const record = { id:LOGIC.makeId(), caseId, blob, createdAt:new Date().toISOString() };
    await new Promise((resolve, reject) => {
      const tx = db.transaction(PHOTO_STORE, "readwrite");
      tx.objectStore(PHOTO_STORE).add(record);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
    return record.id;
  },
  async get(id){
    const db = await this.db();
    return new Promise((resolve, reject) => {
      const req = db.transaction(PHOTO_STORE, "readonly").objectStore(PHOTO_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },
  async remove(id){
    const db = await this.db();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(PHOTO_STORE, "readwrite");
      tx.objectStore(PHOTO_STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async removeByCase(caseId){
    const db = await this.db();
    const ids = await new Promise((resolve, reject) => {
      const tx = db.transaction(PHOTO_STORE, "readonly");
      const idx = tx.objectStore(PHOTO_STORE).index("caseId");
      const req = idx.getAll(caseId);
      req.onsuccess = () => resolve((req.result || []).map((x) => x.id));
      req.onerror = () => reject(req.error);
    });
    for(const id of ids){ await this.remove(id); }
  }
};

let DB = Store.empty();
let VIEW = { name:"list", caseId:null, tab:"today", filter:"active" };
let SAVE_OK = true;
let LAST_SAVE_AT = null;
let saveTimer = null;
let toastTimer = null;
let PHOTO_URLS = {};

function debounce(fn, wait){
  return function(){
    const args = arguments;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => fn.apply(null, args), wait);
  };
}

function findCase(id){
  return DB.cases.find((c) => c.id === id) || null;
}

function activeCases(){
  return DB.cases.filter((c) => !c.deletedAt && c.status === "active");
}

function trashCases(){
  return DB.cases.filter((c) => !!c.deletedAt);
}

function visibleCases(){
  return DB.cases.filter((c) => {
    if(c.deletedAt){ return false; }
    if(VIEW.filter === "all"){ return true; }
    return c.status === VIEW.filter;
  });
}

function currentCase(){
  return findCase(VIEW.caseId);
}

function currentDay(caseObj){
  return LOGIC.ensureTodayDay(caseObj, todayISO());
}

function renderSaveMeta(){
  if(!LAST_SAVE_AT){ return SAVE_OK ? "未保存の変更なし" : "保存先に書き込めません"; }
  return SAVE_OK ? "保存しました " + timeLabel(LAST_SAVE_AT) : "保存に失敗しました";
}

function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

function refreshCounts(){
  const trashN = String(trashCases().length);
  const exportN = String(activeCases().length);
  document.querySelectorAll('[data-count="trash"]').forEach((el) => { el.textContent = trashN; });
  document.querySelectorAll('[data-count="export"]').forEach((el) => { el.textContent = exportN; });
}

function refreshNav(){

async function saveNow(options = {}){
  SAVE_OK = await Store.save(DB);
  LAST_SAVE_AT = new Date().toISOString();
  if(options.toast){
    toast(SAVE_OK ? "保存しました " + timeLabel(LAST_SAVE_AT) : "保存に失敗しました");
  }
  renderSaveOnly();
  return SAVE_OK;
}

const queueSave = debounce(function(){ saveNow(); }, 360);

function persist(options = {}){
  if(options.render !== false){ render(); }
  if(options.immediate){ saveNow({ toast:options.toast }); }
  else { queueSave(); }
}

function renderSaveOnly(){
  const nodes = document.querySelectorAll("[data-save-meta]");
  nodes.forEach((node) => { node.textContent = renderSaveMeta(); });
  refreshCounts();
}

  const caseObj = findCase(caseId);
  const day = LOGIC.getDay(caseObj, date) || LOGIC.ensureTodayDay(caseObj, date);
  if(kind === "todo"){ day.todos.push({ id:LOGIC.makeId(), text, done:false }); }
  if(kind === "wait"){ day.waits.push({ id:LOGIC.makeId(), text, resolved:false }); }
  if(kind === "hook"){ day.hooks.push({ id:LOGIC.makeId(), text }); }
  input.value = "";
  persist();
  const next = document.getElementById(inputId);
  if(next){ next.focus(); }
}

  const item = list.find((x) => x.id === itemId);
  item[field] = value;
  if(field === "done" || field === "resolved"){ persist(); } else { queueSave(); }

  const caseObj = findCase(caseId);

    const id = await Photos.add(caseId, file);
    caseObj.admission.photoIds.push(id);
  }
  input.value = "";
  persist();
}

async function resolvePhotoUrls(caseObj){
  const next = {};
  for(const id of caseObj.admission.photoIds){
    if(PHOTO_URLS[id]){ next[id] = PHOTO_URLS[id]; continue; }
    const record = await Photos.get(id);
    if(record){
      next[id] = URL.createObjectURL(record.blob);
    }
  }
  Object.keys(PHOTO_URLS).forEach((id) => {
    if(!next[id]){ URL.revokeObjectURL(PHOTO_URLS[id]); }
  });
  PHOTO_URLS = next;
}

async function openPhoto(photoId){
  const record = await Photos.get(photoId);
  if(!record){ return; }
  const url = PHOTO_URLS[photoId] || URL.createObjectURL(record.blob);
  PHOTO_URLS[photoId] = url;
  showModal(`
    <h3>写真</h3>
    <img src="${esc(url)}" alt="" style="width:100%;border-radius:16px;margin-top:14px">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">閉じる</button>
    </div>
  `);
}

async function sharePhoto(photoId){
  const record = await Photos.get(photoId);
  if(!record){ return; }
  const file = new File([record.blob], `${photoId}.jpg`, { type:record.blob.type || "image/jpeg" });
  if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
    await navigator.share({ files:[file], title:"Casebook photo" });
    toast("共有シートを開きました");
    return;
  }
  const url = URL.createObjectURL(record.blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${photoId}.jpg`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("画像をダウンロードしました");
}

                  <textarea class="textarea" rows="4" placeholder="Assessment" oninput="updateProblem('${caseObj.id}','${problem.id}','assessment',this.value)">${esc(problem.assessment)}</textarea>
                  <div class="inline-actions">
                    <button class="compact-btn" onclick="deleteProblem('${caseObj.id}','${problem.id}')">削除</button>
                  </div>
                </div>
              </article>
            `).join("") : `<div class="empty">問題を追加してください。</div>`}
          </div>
        </section>
      </div>

      <div class="stack">
        <section class="collapse">
          <div class="collapse-head">
            <div>
              <h2>入院時記録</h2>
              <div class="panel-sub">写真とテンプレ節チェックをここで管理</div>
            </div>
            <button class="compact-btn" onclick="toggleSection(this,'admissionBody')">${admitExpanded ? "閉じる" : "開く"}</button>
          </div>
          <div class="collapse-body ${admitExpanded ? "" : "hide"}" id="admissionBody">
            <label class="panel-sub">入院時記録</label>
            <textarea class="textarea" rows="5" placeholder="入院時記録" oninput="updateCaseText('${caseObj.id}','admission.note',this.value)">${esc(caseObj.admission.note)}</textarea>
            <div class="photo-note">テンプレ準拠のカルテ記載は写真で残す。チェックは各節を書いたかの確認</div>
            <label class="btn btn-ghost btn-block file-btn" style="margin-top:12px">
              📷 写真を追加
              <input type="file" accept="image/*" capture="environment" multiple onchange="handlePhotoInput(this,'${caseObj.id}')">
            </label>
            <div class="photo-grid" id="photoGrid">${renderPhotoGrid(caseObj)}</div>
            <div style="margin-top:14px" class="routine-grid">
              ${ROUTINE.map((item) => `
                <button class="routine-btn ${caseObj.admission.routine[item.k] ? "on" : ""}" onclick="toggleRoutine('${caseObj.id}','${item.k}')">
                  <span class="routine-box">${caseObj.admission.routine[item.k] ? "✓" : ""}</span>
                  <span class="routine-copy"><strong>${esc(item.t)}</strong><span>${esc(item.h)}</span></span>
                </button>
              `).join("")}
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h2>薬剤</h2><div class="panel-sub">内服 / 注射</div></div>
          <div class="panel-body">
            <div class="modal-grid">
              <input id="medName" class="input" placeholder="薬剤名">
              <select id="medRoute" class="select"><option value="oral">内服</option><option value="inj">注射</option></select>
              <input id="medStart" class="input" type="date" value="${todayISO()}">
              <input id="medEnd" class="input" type="date">
            </div>
            <div style="margin-top:10px">
              <input id="medNote" class="input" placeholder="メモ">
            </div>
            <div class="inline-actions" style="margin-top:10px"><button class="btn btn-ghost" onclick="createMed()">追加</button></div>
            <div class="med-list" style="margin-top:14px">${renderMedList(caseObj)}</div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h2>イベント</h2><div class="panel-sub">検査 / 手術 / 処置 / 治療 / その他</div></div>
          <div class="panel-body">
            <div class="modal-grid">
              <input id="evDate" class="input" type="date" value="${todayISO()}">
              <select id="evType" class="select">
                <option value="test">検査</option>
                <option value="surgery">手術</option>
                <option value="procedure">処置</option>
                <option value="treatment">治療</option>
                <option value="other">その他</option>
              </select>
            </div>
            <div style="margin-top:10px"><input id="evTitle" class="input" placeholder="タイトル"></div>
            <div style="margin-top:10px"><input id="evNote" class="input" placeholder="メモ"></div>
            <div class="inline-actions" style="margin-top:10px"><button class="btn btn-ghost" onclick="createEvent()">追加</button></div>
            <div class="event-list" style="margin-top:14px">${renderEventList(caseObj)}</div>
          </div>
        </section>

        <section class="collapse">
          <div class="collapse-head">
            <div>
              <h2>退院サマリ</h2>
              <div class="panel-sub">退院書き出しに反映</div>
            </div>
            <button class="compact-btn" onclick="toggleSection(this,'summaryBody')">開く</button>
          </div>
          <div class="collapse-body hide" id="summaryBody">
            <label class="panel-sub">経過</label>
            <textarea class="textarea" rows="5" oninput="updateCaseText('${caseObj.id}','summary.course',this.value)">${esc(caseObj.summary.course)}</textarea>
            <label class="panel-sub" style="display:block;margin-top:10px">転帰</label>
            <textarea class="textarea" rows="3" oninput="updateCaseText('${caseObj.id}','summary.outcome',this.value)">${esc(caseObj.summary.outcome)}</textarea>
            <label class="panel-sub" style="display:block;margin-top:10px">自分の診療</label>
            <textarea class="textarea" rows="4" oninput="updateCaseText('${caseObj.id}','summary.myPractice',this.value)">${esc(caseObj.summary.myPractice || "")}</textarea>
            <div class="inline-actions" style="margin-top:12px">
              ${caseObj.status === "active"
                ? `<button class="btn btn-primary" onclick="setCaseStatus('${caseObj.id}','discharged')">退院にする</button>`
                : `<button class="btn btn-ghost" onclick="setCaseStatus('${caseObj.id}','active')">入院中へ戻す</button>`}
              <button class="btn btn-ghost" onclick="copyDischargeExport('${caseObj.id}')">退院書き出し</button>
            </div>
          </div>
        </section>
      </div>
    </section>
  `;
}

function renderContingencyList(caseObj){
  return `
    <div class="list">
      ${caseObj.contingency.length ? caseObj.contingency.map((item) => `
        <div class="row-item">
          <span class="row-dot"></span>
          <div class="row-input" style="cursor:default">${esc(item.text)}</div>
          <button class="row-del" onclick="removeContingency('${caseObj.id}','${item.id}')" aria-label="削除">×</button>
        </div>
      `).join("") : `<div class="empty">まだありません。</div>`}
    </div>
    <div class="add-row">
      <input id="contingencyInput" class="input" placeholder="夜間38.5℃以上→血培2セット" enterkeyhint="done" onkeydown="if(event.key==='Enter'){addContingency('${caseObj.id}')}">
      <button class="btn btn-ghost" onclick="addContingency('${caseObj.id}')">追加</button>
    </div>
  `;
}

function renderTodoLike(caseObj, day, kind){
  const config = {
    todo:{ key:"todos", input:"今日やるを追加", done:"done" },
    wait:{ key:"waits", input:"待ちを追加", done:"resolved" },
    hook:{ key:"hooks", input:"引っかかりを追加", done:null }
  }[kind];
  const items = day[config.key];
  return `
    <div class="list">
      ${items.length ? items.map((item) => `
        <div class="row-item">
          ${config.done
            ? `<button class="row-check ${item[config.done] ? (kind === "wait" ? "wait" : "done") : ""}" onclick="updateTextItem('${caseObj.id}','${day.date}','${kind}','${item.id}','${config.done}',${item[config.done] ? "false" : "true"})" aria-label="完了切替"><span>${item[config.done] ? "✓" : ""}</span></button>`
            : `<span class="row-dot"></span>`}
          <input class="row-input ${config.done && item[config.done] ? "muted" : ""}" value="${esc(item.text)}" oninput="updateTextItem('${caseObj.id}','${day.date}','${kind}','${item.id}','text',this.value)">
          <button class="row-del" onclick="deleteTextItem('${caseObj.id}','${day.date}','${kind}','${item.id}')" aria-label="削除">×</button>
        </div>
      `).join("") : `<div class="empty">まだありません。</div>`}
    </div>
    <div class="add-row">
      <input id="${kind}Input-${day.date}" class="input" placeholder="${config.input}" enterkeyhint="done" onkeydown="if(event.key==='Enter'){addTextItem('${caseObj.id}','${kind}','${day.date}')}">
      <button class="btn btn-ghost" onclick="addTextItem('${caseObj.id}','${kind}','${day.date}')">追加</button>
    </div>
  `;
}

function renderPhotoGrid(caseObj){
  if(!caseObj.admission.photoIds.length){ return `<div class="empty" style="grid-column:1/-1">写真はまだありません。</div>`; }
  return caseObj.admission.photoIds.map((id) => `
    <div class="photo-card">
      <img src="${esc(PHOTO_URLS[id] || "")}" alt="" onclick="openPhoto('${id}')">
      <div class="photo-actions">
        <button class="compact-btn" onclick="openPhoto('${id}')">表示</button>
        <button class="compact-btn" onclick="sharePhoto('${id}')">共有</button>
        <button class="compact-btn" onclick="deletePhoto('${caseObj.id}','${id}')">削除</button>
      </div>
    </div>
  `).join("");
}

function renderMedList(caseObj){
  if(!caseObj.meds.length){ return `<div class="empty">薬剤はまだありません。</div>`; }
  return caseObj.meds.map((med) => `
    <div class="med-item">
      <div class="line-top">
        <div>
          <div class="line-title">${esc(med.name)}</div>
          <div class="line-sub">${esc(LOGIC.MED_ROUTE_LABELS[med.route])} / ${esc(med.startDate)} 〜 ${esc(med.endDate || "継続中")}</div>
          ${med.note ? `<div class="line-sub">${esc(med.note)}</div>` : ""}
        </div>
        <button class="compact-btn" onclick="deleteMed('${med.id}')">削除</button>
      </div>
    </div>
  `).join("");
}

function renderEventList(caseObj){
  if(!caseObj.events.length){ return `<div class="empty">イベントはまだありません。</div>`; }
  return caseObj.events.map((eventObj) => `
    <div class="event-item">
      <div class="line-top">
        <div>
          <div class="line-title">${esc(eventObj.title)}</div>
          <div class="line-sub">${esc(eventObj.date)} / ${esc(LOGIC.EVENT_TYPE_LABELS[eventObj.type])}</div>
          ${eventObj.note ? `<div class="line-sub">${esc(eventObj.note)}</div>` : ""}
        </div>
        <button class="compact-btn" onclick="deleteEvent('${eventObj.id}')">削除</button>
      </div>
    </div>
  `).join("");
}

function renderLogTab(caseObj){
  const days = caseObj.days.slice().sort((a,b) => b.date.localeCompare(a.date));
  return `
    <section class="panel" style="margin-top:14px">
      <div class="panel-head"><h2>過去ログ</h2><div class="panel-sub">todos / waits / hooks を後から編集できる</div></div>
      <div class="panel-body log-group">
        ${days.length ? days.map((day) => `
          <article class="log-card">
            <div class="log-title">
              <strong class="mono">${esc(day.date)}</strong>
              <span class="panel-sub">病日 ${LOGIC.dayNumber(caseObj, day.date)}</span>
            </div>
            <div style="margin-top:14px"><strong>今日やる</strong></div>
            ${renderTodoLike(caseObj, day, "todo")}
            <div style="margin-top:14px"><strong>待ち</strong></div>
            ${renderTodoLike(caseObj, day, "wait")}
            <div style="margin-top:14px"><strong>引っかかり</strong></div>
            ${renderTodoLike(caseObj, day, "hook")}
          </article>
        `).join("") : `<div class="empty">ログがありません。</div>`}
      </div>
    </section>
  `;
}

function renderTimelineTab(caseObj){
  const days = caseObj.days.slice().sort((a,b) => a.date.localeCompare(b.date));
  const dates = days.map((d) => d.date);
  return `
    <section class="panel" style="margin-top:14px">
      <div class="panel-head"><h2>経過表</h2><div class="panel-sub">入院日から今日までの簡易タイムライン</div></div>
      <div class="panel-body">
        <div class="timeline-wrap">
          <table class="timeline">
            <thead>
              <tr>
                <th>項目</th>
                ${dates.map((date) => `<th class="${date === todayISO() ? "today" : ""}"><div class="mono">${esc(date.slice(5).replace("-","/"))}</div></th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${caseObj.meds.map((med) => `
                <tr>
                  <td>${esc(med.name)}<div class="panel-sub">${esc(LOGIC.MED_ROUTE_LABELS[med.route])}</div></td>
                  ${days.map((day) => {
                    const on = med.startDate && med.startDate <= day.date && (!med.endDate || med.endDate >= day.date);
                    const cls = [
                      day.date === todayISO() ? "today" : "",
                      on ? (med.route === "oral" ? "band-oral" : "band-inj") : ""
                    ].filter(Boolean).join(" ");
                    const tag = !on ? ""
                      : med.startDate === day.date && med.endDate === day.date ? `<span class="band-tag">開始/終了</span>`
                      : med.startDate === day.date ? `<span class="band-tag">開始</span>`
                      : med.endDate === day.date ? `<span class="band-tag">終了</span>`
                      : "";
                    return `<td class="${cls}">${tag}</td>`;
                  }).join("")}
                </tr>
              `).join("")}
              <tr>
                <td>イベント</td>
                ${days.map((day) => {
                  const list = caseObj.events.filter((eventObj) => eventObj.date === day.date);
                  return `<td class="${day.date === todayISO() ? "today" : ""}"><div class="cell-stack">${list.map((eventObj) => `<button class="event-dot" title="${esc(LOGIC.EVENT_TYPE_LABELS[eventObj.type] + " " + eventObj.title)}" onclick="showEventInfo('${eventObj.id}')">${esc(LOGIC.EVENT_TYPE_LABELS[eventObj.type].slice(0,1))}</button>`).join("")}</div></td>`;
                }).join("")}
              </tr>
            </tbody>
          </table>
        </div>
        <div class="tl-legend">
          <span class="legend-chip oral">帯 = 内服</span>
          <span class="legend-chip inj">帯 = 注射</span>
          <span class="legend-chip ev">●(頭文字) = イベント・タップで詳細</span>
        </div>
      </div>
    </section>
  `;
}

function showEventInfo(eventId){
  const caseObj = currentCase();
  const eventObj = caseObj.events.find((e) => e.id === eventId);
  showModal(`
    <h3>${esc(eventObj.title)}</h3>
    <p class="sub">${esc(eventObj.date)} / ${esc(LOGIC.EVENT_TYPE_LABELS[eventObj.type])}</p>
    <div style="margin-top:12px">${esc(eventObj.note || "メモなし")}</div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">閉じる</button></div>
  `);
}

function renderTrash(){
  const items = trashCases().sort((a,b) => (b.deletedAt || "").localeCompare(a.deletedAt || ""));
  return `
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">Trash</div>
          <h1 class="page">ゴミ箱</h1>
          <div class="sub">削除済み症例は30日で自動 purge。復元か完全削除のみ。</div>
        </div>
        <button class="btn btn-ghost" onclick="go('list')">一覧へ戻る</button>
      </div>
    </section>
    ${items.length ? `<div class="case-grid">${items.map((caseObj) => `
      <article class="case-card">
        <div class="case-top">
          <div>
            <div class="case-label">${esc(LOGIC.formatLabel(caseObj) || "未設定")}</div>
            <div class="case-cc">${esc(caseObj.cc || "一言未入力")}</div>
          </div>
          <div class="badge trash">削除 ${esc((caseObj.deletedAt || "").slice(0,10))}</div>
        </div>
        <div class="inline-actions" style="margin-top:14px">
          <button class="btn btn-ghost" onclick="restoreCase('${caseObj.id}')">復元</button>
          <button class="btn btn-danger" onclick="permanentlyDeleteCase('${caseObj.id}')">完全削除</button>
        </div>
      </article>
    `).join("")}</div>` : `<div class="empty">ゴミ箱は空です。</div>`}
  `;
}

async function hydrateCaseAsync(){
  const caseObj = currentCase();
  if(!caseObj){ return; }
  await resolvePhotoUrls(caseObj);
  const grid = document.getElementById("photoGrid");
  if(grid){ grid.innerHTML = renderPhotoGrid(caseObj); }
}

function toggleSection(button, id){
  const el = document.getElementById(id);
  if(!el){ return; }
  el.classList.toggle("hide");
  button.textContent = el.classList.contains("hide") ? "開く" : "閉じる";
}

async function boot(){
  DB = await Store.load();
  const purged = LOGIC.purgeTrash(DB, todayISO());
  DB = purged.data;
  for(const caseObj of DB.cases){
    if(caseObj.status === "active" && !caseObj.deletedAt){
      Object.assign(caseObj, LOGIC.rolloverCase(caseObj, todayISO()));
    }
  }
  SAVE_OK = await Store.save(DB);
  LAST_SAVE_AT = new Date().toISOString();
  render();
  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "visible"){
      let changed = false;
      DB.cases.forEach((caseObj) => {
        if(caseObj.status === "active" && !caseObj.deletedAt){
          const before = JSON.stringify(caseObj.days);
          Object.assign(caseObj, LOGIC.rolloverCase(caseObj, todayISO()));
          if(JSON.stringify(caseObj.days) !== before){ changed = true; }
        }
      });
      if(changed){ persist(); }
    }
  });
}

boot();
</script>
</body>
</html>
